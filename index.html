    ${vs.map(vd=>`<tr><td>${fmtDate(vd.data)}</td><td>${clienteNome(vd.cliId)}</td><td style="color:var(--txt3)">${vd.itens.length}x</td><td>${vd.pgto}</td>
    <td>${vd.status==='pago'?'<span class="bdg bdg-g">Pago</span>':'<span class="bdg bdg-y">Pendente</span>'}</td>
    <td><strong>${fmt(vd.totalF)}</strong></td>
    <td><button class="btn-ic" onclick="imprimirVenda('${vd.id}')"><svg width="12" height="12" fill="none" viewBox="0 0 24 24"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg></button></td>
    </tr>`).join('')}
  </tbody></table></div>`}</div>`
}
function relFinHTML(de,ate){
  const ts=DB.get(S.TRANS).filter(t=>t.data>=de&&t.data<=ate)
  const ent=ts.filter(t=>t.tipo==='entrada').reduce((a,t)=>a+t.val,0)
  const sai=ts.filter(t=>t.tipo==='saida').reduce((a,t)=>a+t.val,0)
  // group by category
  const cats={}
  ts.forEach(t=>{if(!cats[t.cat])cats[t.cat]={e:0,s:0};cats[t.cat][t.tipo==='entrada'?'e':'s']+=t.val})
  return`
  <div class="stats-grid" style="margin-bottom:16px">
    <div class="stat g"><div class="stat-lbl">Entradas</div><div class="stat-val">${fmt(ent)}</div></div>
    <div class="stat r"><div class="stat-lbl">Saídas</div><div class="stat-val">${fmt(sai)}</div></div>
    <div class="stat ${ent-sai>=0?'g':'r'}"><div class="stat-lbl">Resultado</div><div class="stat-val" style="color:${ent-sai>=0?'var(--ok)':'var(--bad)'}">${fmt(ent-sai)}</div></div>
  </div>
  <div class="card"><div class="card-title">Por Categoria</div>
  <div class="tc"><table><thead><tr><th>Categoria</th><th>Entradas</th><th>Saídas</th><th>Saldo</th></tr></thead><tbody>
    ${Object.entries(cats).sort((a,b)=>b[1].e-a[1].e).map(([cat,v])=>`<tr>
      <td>${cat}</td><td style="color:var(--ok)">${v.e>0?fmt(v.e):'—'}</td>
      <td style="color:var(--bad)">${v.s>0?fmt(v.s):'—'}</td>
      <td style="font-weight:700;color:${v.e-v.s>=0?'var(--ok)':'var(--bad)'}">${fmt(v.e-v.s)}</td>
    </tr>`).join('')}
  </tbody></table></div></div>`
}
function relProdHTML(de,ate){
  const vs=DB.get(S.VENDAS).filter(v=>v.data>=de&&v.data<=ate)
  const map={}
  vs.forEach(vd=>vd.itens.forEach(it=>{if(!map[it.nome])map[it.nome]={qtd:0,total:0};map[it.nome].qtd+=it.qtd;map[it.nome].total+=it.sub}))
  const rows=Object.entries(map).sort((a,b)=>b[1].total-a[1].total)
  return`
  <div class="card"><div class="card-title">Produtos mais Vendidos</div>
  ${!rows.length?`<div class="empty"><h3>Sem dados no período</h3></div>`:`
  <div class="tc"><table><thead><tr><th>Produto</th><th>Qtd Vendida</th><th>Faturamento</th><th>% do Total</th></tr></thead><tbody>
    ${(()=>{const tot=rows.reduce((a,r)=>a+r[1].total,0);return rows.map(([nome,d])=>`<tr><td><strong>${nome}</strong></td><td>${d.qtd}</td><td>${fmt(d.total)}</td>
    <td><div style="display:flex;align-items:center;gap:8px"><div class="pbar-wrap" style="width:80px"><div class="pbar-fill" style="width:${Math.round((d.total/tot)*100)}%"></div></div><span style="font-size:12px;color:var(--txt3)">${Math.round((d.total/tot)*100)}%</span></div></td>
    </tr>`)})().join('')}
  </tbody></table></div>`}</div>`
}
function relCliHTML(de,ate){
  const vs=DB.get(S.VENDAS).filter(v=>v.data>=de&&v.data<=ate)
  const map={}
  vs.forEach(vd=>{if(!map[vd.cliId])map[vd.cliId]={n:0,total:0};map[vd.cliId].n++;map[vd.cliId].total+=vd.totalF})
  const rows=Object.entries(map).sort((a,b)=>b[1].total-a[1].total)
  return`
  <div class="card"><div class="card-title">Clientes por Faturamento</div>
  ${!rows.length?`<div class="empty"><h3>Sem dados no período</h3></div>`:`
  <div class="tc"><table><thead><tr><th>Cliente</th><th>Nº Pedidos</th><th>Total Gasto</th><th>Ticket Médio</th></tr></thead><tbody>
    ${rows.map(([cliId,d])=>`<tr><td><strong>${clienteNome(cliId)}</strong></td><td>${d.n}</td><td>${fmt(d.total)}</td><td>${fmt(d.total/d.n)}</td></tr>`).join('')}
  </tbody></table></div>`}</div>`
}
function imprimirRelatorio(){
  const {de,ate}=getRelDatas()
  const vs=DB.get(S.VENDAS).filter(v=>v.data>=de&&v.data<=ate)
  const ts=DB.get(S.TRANS).filter(t=>t.data>=de&&t.data<=ate)
  const ent=ts.filter(t=>t.tipo==='entrada').reduce((a,t)=>a+t.val,0)
  const sai=ts.filter(t=>t.tipo==='saida').reduce((a,t)=>a+t.val,0)
  const fat=vs.reduce((a,v)=>a+v.totalF,0)
  const res=ent-sai
  const statStyle=(cor)=>`flex:1;background:#F8F7F4;border-radius:6px;padding:12px;border-left:3px solid ${cor}`
  const w=window.open('','_blank','width=900,height=700')
  w.document.write(docHead('RELATÓRIO DE GESTÃO')+
    `<div class="doc-title-row">
      <div class="doc-title-num">RELATÓRIO DE GESTÃO</div>
      <div class="doc-title-date">${fmtDate(de)} a ${fmtDate(ate)}</div>
    </div>
    <div class="info-bar" style="margin-bottom:16px">
      <span>PERÍODO: ${fmtDate(de)} a ${fmtDate(ate)}</span>
      <span>VENDAS: ${vs.length}</span>
      <span>LANÇAMENTOS: ${ts.length}</span>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:20px">
      <div style="${statStyle('#B8912A')}"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#8A7E6E">Faturamento</div><div style="font-family:'Palatino Linotype',serif;font-size:20px;color:#1C1A18">${fmt(fat)}</div></div>
      <div style="${statStyle('#3D8A5E')}"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#8A7E6E">Entradas</div><div style="font-family:'Palatino Linotype',serif;font-size:20px;color:#3D8A5E">${fmt(ent)}</div></div>
      <div style="${statStyle('#B84040')}"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#8A7E6E">Saídas</div><div style="font-family:'Palatino Linotype',serif;font-size:20px;color:#B84040">${fmt(sai)}</div></div>
      <div style="${statStyle(res>=0?'#3D8A5E':'#B84040')}"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#8A7E6E">Resultado</div><div style="font-family:'Palatino Linotype',serif;font-size:20px;color:${res>=0?'#3D8A5E':'#B84040'}">${fmt(res)}</div></div>
    </div>
    <div class="prod-hdr">VENDAS NO PERÍODO (${vs.length})</div>
    <table class="prod-table">
      <thead><tr><th>DATA</th><th>CLIENTE</th><th>PAGAMENTO</th><th>STATUS</th><th class="r">TOTAL</th></tr></thead>
      <tbody>
        ${vs.length?vs.map(vd=>`<tr><td>${fmtDate(vd.data)}</td><td>${clienteNome(vd.cliId)}</td><td>${vd.pgto}</td><td>${vd.status==='pago'?'✓ Pago':'Pendente'}</td><td class="r"><strong>${fmt(vd.totalF)}</strong></td></tr>`).join(''):'<tr><td colspan="5" style="text-align:center;color:#8A7E6E;padding:16px">Nenhuma venda no período</td></tr>'}
      </tbody>
    </table>
    <div class="prod-hdr" style="margin-top:16px">LANÇAMENTOS FINANCEIROS (${ts.length})</div>
    <table class="prod-table">
      <thead><tr><th>DATA</th><th>TIPO</th><th>CATEGORIA</th><th>DESCRIÇÃO</th><th class="r">VALOR</th></tr></thead>
      <tbody>
        ${ts.length?ts.sort((a,b)=>b.data.localeCompare(a.data)).map(t=>`<tr><td>${fmtDate(t.data)}</td><td>${t.tipo==='entrada'?'Entrada':'Saída'}</td><td>${t.cat}</td><td>${t.desc}</td><td class="r" style="color:${t.tipo==='entrada'?'#3D8A5E':'#B84040'};font-weight:700">${t.tipo==='entrada'?'+':'-'}${fmt(t.val)}</td></tr>`).join(''):'<tr><td colspan="5" style="text-align:center;color:#8A7E6E;padding:16px">Nenhum lançamento no período</td></tr>'}
      </tbody>
    </table>`
    +docFoot('',false))
  w.document.close();setTimeout(()=>w.print(),400)
}

// ===== MENU (mobile) =====
function toggleMenu(){
  const sb=document.getElementById('sidebar')
  const ov=document.getElementById('sidebarOv')
  const isOpen=sb.classList.toggle('open')
  if(ov)ov.classList.toggle('open',isOpen)
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open')
  const ov=document.getElementById('sidebarOv')
  if(ov)ov.classList.remove('open')
}

// ===== INIT =====
function applyMenuVisibility(){
  const isMob=window.innerWidth<=768
  const btn=document.getElementById('menuBtn')
  if(btn)btn.style.display=isMob?'flex':'none'
}
function init(){
  initSample()
  const now=new Date()
  document.getElementById('hdrDate').textContent=now.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})
  const h=now.getHours()
  document.getElementById('hdrGreet').textContent=h<12?'Bom dia ☀️':h<18?'Boa tarde 🌤':'Boa noite 🌙'
  applyMenuVisibility()
  window.addEventListener('resize',applyMenuVisibility)
  renderSlogoInfo()
  checkClientView()
  if(!location.hash.startsWith('#orcview='))render('dashboard')
}

window.addEventListener('DOMContentLoaded',init)
</script>
