<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DoceSistema — Gestão de Confeitaria</title>
<style>
:root{--choc:#1C1A18;--choc2:#2A2724;--choc3:#3A3632;--cara:#B8912A;--cara2:#D4AD50;--cream:#F8F7F4;--cream2:#EDEBE6;--ivory:#FDFCFA;--txt:#1C1A18;--txt2:#52493E;--txt3:#8A7E6E;--white:#FFFFFF;--ok:#3D8A5E;--warn:#C4724A;--bad:#B84040;--sw:260px;--hh:64px;--r:12px;--sh:0 2px 16px rgba(28,26,24,.09);--shm:0 4px 28px rgba(28,26,24,.16)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Trebuchet MS','Calibri',sans-serif;background:var(--cream);color:var(--txt);min-height:100vh;display:flex}
.sidebar{width:var(--sw);background:var(--choc);min-height:100vh;position:fixed;left:0;top:0;display:flex;flex-direction:column;z-index:100;transition:transform .3s}
.slogo{padding:12px 14px 10px;border-bottom:1px solid rgba(255,255,255,.07)}
.slogo img{max-height:68px;width:auto;max-width:140px;object-fit:contain;display:block;margin:0 auto}
.slogo-icon{width:36px;height:36px;background:var(--cara);border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.slogo h1{font-family:'Palatino Linotype',Palatino,serif;font-size:15px;color:var(--cream);line-height:1.2;letter-spacing:.3px}
.slogo p{font-size:10px;color:rgba(255,255,255,.35);margin-top:2px}
.snav{flex:1;padding:8px 8px;overflow-y:auto}
.snav-lbl{font-size:9.5px;letter-spacing:1.6px;text-transform:uppercase;color:rgba(255,255,255,.28);padding:9px 8px 3px}
.ni{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;cursor:pointer;color:rgba(255,255,255,.55);font-size:13px;transition:all .15s;margin-bottom:1px;user-select:none}
.ni:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.88)}
.ni.active{background:var(--cara);color:#fff}
.ni svg{flex-shrink:0;opacity:.8}
.ni.active svg{opacity:1}
.sfooter{padding:8px 12px;border-top:1px solid rgba(255,255,255,.07);font-size:10px;color:rgba(255,255,255,.22);text-align:center}
.main{margin-left:var(--sw);flex:1;min-height:100vh;display:flex;flex-direction:column}
.hdr{height:var(--hh);background:linear-gradient(135deg,var(--choc) 0%,var(--choc2) 100%);border-bottom:3px solid var(--cara);display:flex;align-items:center;justify-content:space-between;padding:0 26px;position:sticky;top:0;z-index:50;box-shadow:0 4px 20px rgba(28,26,24,.22)}
.hdr-title{font-family:'Palatino Linotype',Palatino,serif;font-size:22px;color:#fff;letter-spacing:.2px}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px;letter-spacing:.2px}
.hdr-greet{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.9);font-size:12px;font-weight:600;padding:6px 14px;border-radius:20px;backdrop-filter:blur(4px)}
.content{flex:1;padding:26px;overflow-y:auto}
.page{display:none;animation:fadeIn .2s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;gap:12px;flex-wrap:wrap}
.ph h2{font-family:'Palatino Linotype',Palatino,serif;font-size:21px;color:var(--choc)}
.ph p{font-size:12px;color:var(--txt3);margin-top:3px}
.ph-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:22px}
.stat{background:var(--white);border-radius:var(--r);padding:18px;box-shadow:var(--sh);border:1px solid var(--cream2);position:relative;overflow:hidden}
.stat::after{content:'';position:absolute;top:0;right:0;width:4px;height:100%;background:var(--cara)}
.stat.g::after{background:var(--ok)}.stat.r::after{background:var(--bad)}.stat.b::after{background:#5478A8}
.stat-lbl{font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.stat-val{font-family:'Palatino Linotype',Palatino,serif;font-size:26px;color:var(--choc);line-height:1}
.stat-sub{font-size:11px;color:var(--txt3);margin-top:5px}
.card{background:var(--white);border-radius:var(--r);padding:18px;box-shadow:var(--sh);border:1px solid var(--cream2)}
.card-title{font-family:'Palatino Linotype',Palatino,serif;font-size:14px;color:var(--choc);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:0}
.dgrid .full{grid-column:1/-1}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-family:inherit;font-weight:600;transition:all .15s;white-space:nowrap}
.btn-p{background:var(--cara);color:#fff}.btn-p:hover{background:var(--cara2);transform:translateY(-1px)}
.btn-s{background:var(--cream2);color:var(--txt)}.btn-s:hover{background:#E0D0C0}
.btn-d{background:#FCEAEA;color:var(--bad)}.btn-d:hover{background:#F8D0D0}
.btn-ok{background:#E8F4EE;color:var(--ok)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-ic{padding:7px;border-radius:7px;background:var(--cream2);color:var(--txt2);border:none;cursor:pointer;display:inline-flex;transition:background .15s}
.btn-ic:hover{background:var(--cream)}
.tbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.srch{position:relative;flex:1;min-width:180px;max-width:280px}
.srch input{width:100%;padding:8px 11px 8px 32px;border:1.5px solid var(--cream2);border-radius:8px;font-size:13px;font-family:inherit;background:var(--cream);outline:none;transition:all .15s;color:var(--txt)}
.srch input:focus{border-color:var(--cara);background:var(--white)}
.srch svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--txt3)}
.tc{overflow-x:auto;border-radius:var(--r);-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--choc);color:rgba(255,255,255,.88);font-size:10.5px;text-transform:uppercase;letter-spacing:1.1px;padding:11px 14px;text-align:left;font-weight:700;white-space:nowrap}
thead th:first-child{border-radius:8px 0 0 0}
thead th:last-child{border-radius:0 8px 0 0}
tbody tr{border-bottom:1px solid var(--cream2);transition:background .12s}
tbody tr:nth-child(even){background:var(--cream)}
tbody tr:hover{background:#E8E4DC}
tbody tr:last-child{border-bottom:none}
tbody td{padding:12px 14px;color:var(--txt);vertical-align:middle}
tbody td:first-child{font-weight:600;color:var(--txt2);white-space:nowrap}
.bdg{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.bdg-g{background:#E8F4EE;color:#2E7D52}.bdg-y{background:#FFF3E0;color:#B05000}.bdg-r{background:#FCEAEA;color:var(--bad)}.bdg-b{background:#E3F2FD;color:#1565C0}.bdg-gr{background:var(--cream2);color:var(--txt2)}
.modal-ov{position:fixed;inset:0;background:rgba(28,26,24,.52);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;padding:16px}
.modal-ov.open{opacity:1;pointer-events:all}
.modal{background:var(--white);border-radius:16px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:0 24px 64px rgba(28,26,24,.28);transform:translateY(14px) scale(.98);transition:transform .2s ease}
.modal-ov.open .modal{transform:translateY(0) scale(1)}
.modal-lg{max-width:700px}
.mhdr{padding:18px 22px 14px;border-bottom:1px solid var(--cream2);display:flex;align-items:center;justify-content:space-between}
.mhdr h2{font-family:'Palatino Linotype',Palatino,serif;font-size:17px;color:var(--choc)}
.mbody{padding:18px 22px}
.mfooter{padding:14px 22px;border-top:1px solid var(--cream2);display:flex;justify-content:flex-end;gap:10px}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.fg label{font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg select,.fg textarea{padding:8px 11px;border:1.5px solid var(--cream2);border-radius:8px;font-size:13px;font-family:inherit;color:var(--txt);background:var(--white);transition:border-color .15s;outline:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--cara)}
.fg textarea{resize:vertical;min-height:72px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.frow.t3{grid-template-columns:1fr 1fr 1fr}
.frow.s1{grid-template-columns:1fr}
.toast-wrap{position:fixed;bottom:22px;right:22px;z-index:500;display:flex;flex-direction:column;gap:7px}
.toast{display:flex;align-items:center;gap:9px;background:var(--choc);color:var(--cream);padding:11px 15px;border-radius:9px;font-size:13px;box-shadow:var(--shm);animation:tin .3s ease;min-width:240px}
.toast.ok{background:var(--ok)}.toast.err{background:var(--bad)}.toast.warn{background:var(--warn)}
@keyframes tin{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes tout{from{transform:translateX(0);opacity:1}to{transform:translateX(100%);opacity:0}}
.toast.out{animation:tout .3s ease forwards}
.items-tbl{border:1.5px solid var(--cream2);border-radius:8px;overflow:hidden;margin-bottom:10px}
.items-hdr{display:grid;grid-template-columns:3fr 1fr 1.5fr 1fr 36px;gap:6px;padding:7px 11px;background:var(--cream);font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--txt3);font-weight:700}
.items-row{display:grid;grid-template-columns:3fr 1fr 1.5fr 1fr 36px;gap:6px;padding:7px 11px;align-items:center;border-top:1px solid var(--cream2)}
.items-row input,.items-row select{padding:5px 7px;border:1.5px solid var(--cream2);border-radius:6px;font-size:12px;font-family:inherit;width:100%;outline:none;color:var(--txt)}
.items-row input:focus,.items-row select:focus{border-color:var(--cara)}
.totbox{background:var(--cream);border-radius:8px;padding:11px 15px}
.trow{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;color:var(--txt2)}
.trow.bold{font-weight:700;font-size:15px;color:var(--choc);border-top:1px solid var(--cream2);margin-top:6px;padding-top:8px}
.tabs{display:flex;gap:3px;background:var(--cream2);padding:4px;border-radius:9px;margin-bottom:15px;width:fit-content}
.tab{padding:6px 15px;border-radius:6px;font-size:13px;cursor:pointer;color:var(--txt2);transition:all .15s;user-select:none}
.tab.active{background:var(--white);color:var(--choc);font-weight:600;box-shadow:var(--sh)}
.pbar-wrap{background:var(--cream2);border-radius:20px;height:5px;overflow:hidden;flex:1}
.pbar-fill{height:100%;border-radius:20px;background:var(--cara);transition:width .4s}
.pbar-fill.low{background:var(--bad)}
.empty{text-align:center;padding:52px 20px;color:var(--txt3)}
.empty svg{margin:0 auto 14px;display:block;opacity:.35}
.empty h3{font-family:'Palatino Linotype',Palatino,serif;font-size:17px;margin-bottom:5px;color:var(--txt2)}
.empty p{font-size:13px}
.fin-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--cream2)}
.fin-row:last-child{border-bottom:none}
.fin-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.fin-amt{font-size:15px;font-weight:800;letter-spacing:-.3px}
.fin-amt.inc{color:var(--ok)}.fin-amt.exp{color:var(--bad)}
.sel-filter{padding:7px 10px;border:1.5px solid var(--cream2);border-radius:8px;font-size:13px;font-family:inherit;background:var(--cream);color:var(--txt);outline:none;cursor:pointer}
.sel-filter:focus{border-color:var(--cara)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--cream2);border-radius:3px}
/* ===== BOTTOM NAV MOBILE ===== */
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--choc);z-index:150;box-shadow:0 -2px 16px rgba(0,0,0,.22);padding-bottom:env(safe-area-inset-bottom,0)}
.mob-nav-inner{display:flex;justify-content:space-around;align-items:stretch}
.mob-ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 2px 10px;cursor:pointer;color:rgba(255,255,255,.45);font-size:10px;gap:3px;border:none;background:none;font-family:inherit;min-width:0;transition:color .15s;letter-spacing:.2px}
.mob-ni svg{flex-shrink:0;opacity:.85}
.mob-ni.active{color:var(--cara2)}
.mob-ni.active svg{opacity:1}
.sidebar-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:99;opacity:0;pointer-events:none;transition:opacity .25s}
.sidebar-ov.open{opacity:1;pointer-events:all}
/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  :root{--sw:0px;--hh:54px}
  .sidebar{transform:translateX(-260px);width:260px!important;z-index:101}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  #menuBtn{display:flex!important}
  .hdr{padding:0 14px}
  .hdr-sub{display:none}
  #hdrGreet{display:none}
  .hdr-title{font-size:17px}
  .content{padding:14px;padding-bottom:76px}
  .stats-grid{grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
  .stat{padding:14px}
  .stat-val{font-size:21px}
  .card{padding:14px}
  .dgrid{grid-template-columns:1fr}
  .dgrid .full{grid-column:auto}
  .frow{grid-template-columns:1fr}
  .frow.t3{grid-template-columns:1fr}
  .mob-nav{display:block}
  .modal-ov{padding:0;align-items:flex-end}
  .modal{border-radius:20px 20px 0 0;max-height:92vh;max-width:100%;transform:translateY(40px)}
  .modal-ov.open .modal{transform:translateY(0)}
  .mfooter{padding-bottom:max(14px,env(safe-area-inset-bottom,14px))}
  .items-hdr{grid-template-columns:2fr 52px 78px 52px 32px;gap:4px;padding:6px 8px;font-size:10px}
  .items-row{grid-template-columns:2fr 52px 78px 52px 32px;gap:4px;padding:6px 8px}
  .ph{flex-direction:column;gap:10px}
  .ph-actions{width:100%}
  .tbar{gap:8px}
  .tbar .srch{min-width:0}
  table{font-size:12px}
  thead th{padding:9px 10px;font-size:9.5px;letter-spacing:.8px}
  tbody td{padding:9px 10px}
  .btn-ic{padding:9px}
  .toast-wrap{bottom:72px;right:12px;left:12px}
  .toast{min-width:0;width:100%}
}
@media(max-width:400px){
  .stats-grid{grid-template-columns:1fr}
  .items-hdr,.items-row{grid-template-columns:2fr 44px 70px 44px 28px}
}
.anexo-box{border:1.5px dashed var(--cream2);border-radius:8px;padding:10px 12px;background:var(--cream);transition:border-color .15s;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.anexo-box:hover{border-color:var(--cara)}
.anexo-has{display:flex;align-items:center;gap:10px;width:100%;flex-wrap:wrap}
.anexo-thumb{height:56px;width:72px;object-fit:cover;border-radius:6px;cursor:pointer;border:1px solid var(--cream2);flex-shrink:0}
.anexo-name{flex:1;font-size:12px;color:var(--txt2);word-break:break-all;min-width:0}
.anexo-clip{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--cara);margin-left:5px;vertical-align:middle;cursor:default}
.audio-widget{background:var(--cream);border:1.5px solid var(--cream2);border-radius:8px;padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.audio-btn-rec{display:inline-flex;align-items:center;gap:7px;padding:7px 14px;background:var(--cara);color:#fff;border:none;border-radius:20px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s}
.audio-btn-rec:hover{background:var(--cara2)}
.audio-btn-stop{background:var(--bad)}
.audio-btn-stop:hover{background:#c94040}
.audio-timer{font-size:11px;font-weight:700;color:var(--bad);font-variant-numeric:tabular-nums;letter-spacing:.5px}
.audio-pulse{width:8px;height:8px;background:var(--bad);border-radius:50%;display:inline-block;animation:pulse-rec .9s ease-in-out infinite}
@keyframes pulse-rec{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.orc-st-sel{border:none;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;font-family:inherit}
.rec-card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--cream2);overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .15s}
.rec-card:hover{box-shadow:var(--shm)}
.rec-foto{height:130px;background:var(--cream2) center/cover no-repeat}
.rec-foto-empty{display:flex;align-items:center;justify-content:center;background:var(--cream)}
.rec-body{padding:14px;flex:1;display:flex;flex-direction:column;gap:0}
.rec-nome{font-family:'Palatino Linotype',Palatino,serif;font-size:15px;color:var(--choc);font-weight:600;margin-bottom:2px}
.rec-cat{font-size:11px;color:var(--txt3)}
.rec-meta{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0;font-size:11px;color:var(--txt3)}
.rec-meta span{display:inline-flex;align-items:center;gap:3px}
.rec-ing-preview{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.rec-ing-preview span{background:var(--cream);border-radius:20px;padding:2px 8px;font-size:11px;color:var(--txt2)}
.rec-actions{display:flex;gap:6px;align-items:center;margin-top:auto;padding-top:10px;border-top:1px solid var(--cream2)}
.orc-st-pendente{background:#FFF3E0;color:#B05000}
.orc-st-aprovado{background:#E8F4EE;color:#2E7D52}
.orc-st-recusado{background:#FCEAEA;color:#B84040}
</style>
</head>
<body>

// ===== UTILS =====
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function fmt(n){return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(n||0)}
function fmtN(n){return new Intl.NumberFormat('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n||0)}
function fmtDate(d){if(!d)return'-';return new Date(d+'T12:00:00').toLocaleDateString('pt-BR')}
function today(){return new Date().toISOString().split('T')[0]}
function thisMonth(){return today().slice(0,7)}
function clienteNome(id){const c=DB.get(S.CLIENTES).find(x=>x.id===id);return c?c.nome:'(Cliente não encontrado)'}
function prodNome(id){const p=DB.get(S.PRODUTOS).find(x=>x.id===id);return p?p.nome:'-'}
// Converte quantidade entre unidades compatíveis (g↔kg, ml↔L). Retorna null se incompatível.
function converterUnidade(qtd,from,to){
  if(!from||!to||from===to)return qtd
  const W={'mg':.001,'g':1,'kg':1000}
  const V={'ml':1,'L':1000}
  if(W[from]!==undefined&&W[to]!==undefined)return qtd*W[from]/W[to]
  if(V[from]!==undefined&&V[to]!==undefined)return qtd*V[from]/V[to]
  return null
}

// ===== ANEXO (comprovante / nota fiscal) =====
function _anexoInner(a){
  if(a&&a.data)return`<div class="anexo-has">
    ${a.type&&a.type.startsWith('image/')?`<img src="${a.data}" class="anexo-thumb" onclick="verAnexo()" title="Clique para ampliar">`:
    `<svg width="28" height="28" fill="none" viewBox="0 0 24 24" style="flex-shrink:0;color:var(--cara)"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="currentColor" stroke-width="1.8"/><polyline points="14 2 14 8 20 8" stroke="currentColor" stroke-width="1.8"/></svg>`}
    <span class="anexo-name">${a.name||'arquivo'}</span>
    <div style="display:flex;gap:6px;flex-shrink:0">
      <button type="button" class="btn btn-s btn-sm" onclick="verAnexo()">Ver</button>
      <button type="button" class="btn btn-d btn-sm" onclick="removeAnexo()">Remover</button>
    </div>
  </div>`
  return`<div style="display:flex;align-items:center;gap:8px">
    <button type="button" class="btn btn-s btn-sm" onclick="document.getElementById('anexoInput').click()">
      <svg width="13" height="13" fill="none" viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Selecionar arquivo
    </button>
    <span style="font-size:11px;color:var(--txt3)">JPG, PNG ou PDF — máx. 2 MB</span>
  </div>`
}
function anexoWidget(existing, lbl){
  lbl=lbl||'Anexar Arquivo'
  return`<div class="fg"><label>${lbl}</label>
    <input type="file" id="anexoInput" accept="image/*,.pdf" style="display:none" onchange="handleAnexo(this)">
    <div id="anexoBox" class="anexo-box">${_anexoInner(existing)}</div>
  </div>`
}
function handleAnexo(input){
  const file=input.files[0];if(!file)return
  if(file.size>2*1024*1024){toast('Arquivo muito grande (máx. 2 MB)','err');input.value='';return}
  const reader=new FileReader()
  reader.onload=e=>{
    tempAnexo={name:file.name,type:file.type,data:e.target.result}
    const box=document.getElementById('anexoBox')
    if(box)box.innerHTML=_anexoInner(tempAnexo)
  }
  reader.readAsDataURL(file)
}
function removeAnexo(){
  tempAnexo=null
  const box=document.getElementById('anexoBox')
  if(box)box.innerHTML=_anexoInner(null)
}
function verAnexo(a){
  const src=a||tempAnexo;if(!src||!src.data)return
  if(src.type&&src.type.startsWith('image/')){
    const w=window.open('','_blank')
    w.document.write(`<html><body style="margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh"><img src="${src.data}" style="max-width:100%;max-height:100vh;object-fit:contain"></body></html>`)
    w.document.close()
  }else{
    const el=document.createElement('a');el.href=src.data;el.download=src.name||'arquivo';document.body.appendChild(el);el.click();document.body.removeChild(el)
  }
}
function verComprovante(id){const v=DB.get(S.VENDAS).find(x=>x.id===id);if(v&&v.comprovante)verAnexo(v.comprovante)}
function verNotaCompra(id){const c=DB.get(S.COMPRAS).find(x=>x.id===id);if(c&&c.notaAnexo)verAnexo(c.notaAnexo)}

// ===== ROUTER =====
function navigate(p){
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'))
  document.querySelectorAll('.mob-ni').forEach(n=>n.classList.remove('active'))
  document.querySelectorAll('.page').forEach(pg=>pg.classList.remove('active'))
  const ni=document.querySelector(`[data-page="${p}"]`)
  if(ni)ni.classList.add('active')
  const mni=document.querySelector(`[data-mob-page="${p}"]`)
  if(mni)mni.classList.add('active')
  const pg=document.getElementById('page-'+p)
  if(pg)pg.classList.add('active')
  document.getElementById('hdrTitle').textContent=PTITLES[p]||p
  page=p
  render(p)
  if(window.innerWidth<=768)closeSidebar()
  window.scrollTo(0,0)
}
function render(p){
  const el=document.getElementById('page-'+p)
  if(!el)return
  switch(p){
    case'dashboard':el.innerHTML=dashHTML();bindDash();break
    case'vendas':el.innerHTML=vendasHTML();bindVendas();break
    case'orcamentos':el.innerHTML=orcHTML();bindOrc();break
    case'clientes':el.innerHTML=cliHTML();bindCli();break
    case'estoque':el.innerHTML=estHTML();bindEst();break
    case'compras':el.innerHTML=cmpHTML();bindCmp();break
    case'financeiro':el.innerHTML=finHTML();bindFin();break
    case'os':el.innerHTML=osHTML();bindOS();break
    case'relatorios':el.innerHTML=relHTML();bindRel();break
    case'receitas':el.innerHTML=receitasHTML();bindReceitas();break
    case'empresa':el.innerHTML=empresaHTML();break
  }
}

function dashHTML(){
  const v=DB.get(S.VENDAS),t=DB.get(S.TRANS),p=DB.get(S.PRODUTOS)
  const mes=thisMonth()
  const ent=t.filter(x=>x.tipo==='entrada'&&x.data.startsWith(mes)).reduce((a,x)=>a+x.val,0)
  const sai=t.filter(x=>x.tipo==='saida'&&x.data.startsWith(mes)).reduce((a,x)=>a+x.val,0)
  const vendMes=v.filter(x=>x.data.startsWith(mes)).reduce((a,x)=>a+x.totalF,0)
  const qtdVendMes=v.filter(x=>x.data.startsWith(mes)).length
  const baixo=p.filter(x=>x.estoque<=x.minimo)
  const recentes=v.slice(-5).reverse()
  // mini chart: last 7 days sales
  const days=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(d.toISOString().split('T')[0])}
  const daySales=days.map(d=>v.filter(x=>x.data===d).reduce((a,x)=>a+x.totalF,0))
  const maxSale=Math.max(...daySales,1)
  const barH=daySales.map(s=>Math.round((s/maxSale)*90))
  const dayNames=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb']
  return`
  <div class="stats-grid">
    <div class="stat g"><div class="stat-lbl">Receitas do Mês</div><div class="stat-val">${fmt(ent)}</div><div class="stat-sub">Entradas em ${mes.slice(5)}/2025</div></div>
    <div class="stat r"><div class="stat-lbl">Despesas do Mês</div><div class="stat-val">${fmt(sai)}</div><div class="stat-sub">Saídas em ${mes.slice(5)}/2025</div></div>
    <div class="stat"><div class="stat-lbl">Lucro do Mês</div><div class="stat-val" style="color:${ent-sai>=0?'var(--ok)':'var(--bad)'}">${fmt(ent-sai)}</div><div class="stat-sub">Receitas - Despesas</div></div>
    <div class="stat b"><div class="stat-lbl">Vendas no Mês</div><div class="stat-val">${fmt(vendMes)}</div><div class="stat-sub">${qtdVendMes} pedido${qtdVendMes!==1?'s':''}</div></div>
  </div>
  <div class="dgrid">
    <div class="card full">
      <div class="card-title">Vendas — Últimos 7 Dias
        <span style="font-size:12px;color:var(--txt3);font-family:inherit">Total: ${fmt(daySales.reduce((a,b)=>a+b,0))}</span>
      </div>
      <div style="display:flex;align-items:flex-end;gap:8px;height:110px;padding:0 4px">
        ${days.map((d,i)=>`
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end">
            <div style="font-size:10px;color:var(--txt3)">${daySales[i]>0?fmt(daySales[i]).replace('R$','').trim():''}</div>
            <div style="width:100%;background:var(--cara);border-radius:4px 4px 0 0;height:${barH[i]}px;min-height:3px;opacity:${daySales[i]>0?1:0.3};transition:height .4s"></div>
            <div style="font-size:10px;color:var(--txt3)">${dayNames[new Date(d+'T12:00:00').getDay()]}</div>
          </div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-title">Últimas Vendas</div>
      ${recentes.length===0?`<div class="empty"><p>Nenhuma venda ainda</p></div>`:`
      <div style="display:flex;flex-direction:column;gap:0">
        ${recentes.map(v=>`
          <div class="fin-row">
            <div>
              <div style="font-size:13px;font-weight:600">${clienteNome(v.cliId)}</div>
              <div style="font-size:11px;color:var(--txt3)">${fmtDate(v.data)} · ${v.pgto}</div>
            </div>
            <div style="text-align:right">
              <div style="font-weight:700;color:var(--ok)">${fmt(v.totalF)}</div>
              <div>${v.status==='pago'?'<span class="bdg bdg-g">Pago</span>':'<span class="bdg bdg-y">Pendente</span>'}</div>
            </div>
          </div>`).join('')}
      </div>`}
    </div>
    <div class="card">
      <div class="card-title">Estoque Crítico
        ${baixo.length>0?`<span class="bdg bdg-r">${baixo.length} ite${baixo.length>1?'ns':'m'}</span>`:''}
      </div>
      ${baixo.length===0?`<div class="empty"><svg width="36" height="36" fill="none" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/></svg><p>Estoque OK!</p></div>`:`
      ${baixo.slice(0,6).map(p=>`
        <div class="fin-row">
          <div>
            <div style="font-size:13px;font-weight:600">${p.nome}</div>
            <div style="font-size:11px;color:var(--txt3)">${p.estoque} ${p.un} · mín: ${p.minimo}</div>
          </div>
          <div style="width:80px">
            <div class="pbar-wrap"><div class="pbar-fill low" style="width:${Math.min(100,Math.round((p.estoque/p.minimo)*100))}%"></div></div>
          </div>
        </div>`).join('')}`}
    </div>
  </div>`
}

function renderVItens(prods){
  const el=document.getElementById('vItens');if(!el)return
  el.innerHTML=tempItems.map((it,i)=>`
    <div class="items-row">
      <select oninput="selectProdVenda(${i},this.value)" style="padding:5px 7px;border:1.5px solid var(--cream2);border-radius:6px;font-size:12px;font-family:inherit;outline:none;color:var(--txt)">
        <option value="">Selecionar produto...</option>
        ${prods.map(p=>`<option value="${p.id}" ${it.pId===p.id?'selected':''}>${p.nome} — ${fmt(p.preco)}</option>`).join('')}
        <option value="_custom" ${it.pId==='_custom'?'selected':''}>Outro (digitar)</option>
      </select>
      <input type="number" value="${it.qtd||1}" min="1" oninput="updateItemVenda(${i},'qtd',this.value)">
      <input type="number" value="${it.pu||0}" min="0" step="0.01" oninput="updateItemVenda(${i},'pu',this.value)">
      <span style="font-size:12px;color:var(--txt2);font-weight:600">${fmt(it.sub||0)}</span>
      <button class="btn-ic btn-d" onclick="removeItemVenda(${i})" style="padding:4px"><svg width="12" height="12" fill="none" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
    </div>`).join('')
}

function selectProdVenda(i,pId){
  const prods=DB.get(S.PRODUTOS)
  if(pId&&pId!=='_custom'){
    const p=prods.find(x=>x.id===pId)
    if(p){tempItems[i].pId=pId;tempItems[i].nome=p.nome;tempItems[i].pu=p.preco;tempItems[i].sub=(tempItems[i].qtd||1)*p.preco}
  }else{tempItems[i].pId=pId||'';tempItems[i].nome=''}
  renderVItens(DB.get(S.PRODUTOS).filter(p=>p.tipo==='produto'&&p.ativo));calcVendaTotals()
}
function updateItemVenda(i,f,v){
  tempItems[i][f]=parseFloat(v)||0
  tempItems[i].sub=(tempItems[i].qtd||1)*(tempItems[i].pu||0)
  const rows=document.querySelectorAll('#vItens .items-row')
  if(rows[i]){const sp=rows[i].querySelector('span');if(sp)sp.textContent=fmt(tempItems[i].sub||0)}
  calcVendaTotals()
}
function addItemVenda(){tempItems.push({pId:'',nome:'',qtd:1,pu:0,sub:0});renderVItens(DB.get(S.PRODUTOS).filter(p=>p.tipo==='produto'&&p.ativo));calcVendaTotals()}
function removeItemVenda(i){if(tempItems.length>1)tempItems.splice(i,1);else tempItems=[{pId:'',nome:'',qtd:1,pu:0,sub:0}];renderVItens(DB.get(S.PRODUTOS).filter(p=>p.tipo==='produto'&&p.ativo));calcVendaTotals()}
function calcVendaTotals(){
  const total=tempItems.reduce((a,x)=>a+(x.sub||0),0)
  const desc=parseFloat((document.getElementById('vDesc')||{}).value)||0
  const el=document.getElementById('vTotals');if(!el)return

}

    `<button class="btn btn-s" onclick="closeModal()">Cancelar</button><button class="btn btn-p" onclick="salvarVenda()">Atualizar Venda</button>`,true)
  renderVItens(prods);calcVendaTotals()

function salvarVenda(){
  const cliId=(document.getElementById('vCli')||{}).value
  const data=(document.getElementById('vData')||{}).value
  if(!cliId||!data){toast('Selecione cliente e data','err');return}
  const itens=tempItems.filter(x=>x.sub>0||x.pu>0)
  if(!itens.length){toast('Adicione ao menos um item','err');return}
  const total=itens.reduce((a,x)=>a+x.sub,0)
  const desc=parseFloat((document.getElementById('vDesc')||{}).value)||0
  const totalF=total-desc
  const pgto=(document.getElementById('vPgto')||{}).value
  const status=(document.getElementById('vStatus')||{}).value
  const obs=(document.getElementById('vObs')||{}).value
  const noivos=v('vNoivos')
  const vendas=DB.get(S.VENDAS);const trans=DB.get(S.TRANS)
  const prods=DB.get(S.PRODUTOS)
  function descontarEstoque(itensList,sinal){
    itensList.forEach(it=>{if(!it.pId||it.pId==='_custom')return;const i=prods.findIndex(p=>p.id===it.pId);if(i>=0)prods[i].estoque=Math.max(0,(prods[i].estoque||0)+sinal*(parseFloat(it.qtd)||0))})
  }
  if(editId){
    const old=vendas.find(x=>x.id===editId)
    if(old)descontarEstoque(old.itens,+1)
    descontarEstoque(itens,-1)
    const idx=vendas.findIndex(x=>x.id===editId)
    if(idx>=0)vendas[idx]={id:editId,cliId,data,itens,total,desc,totalF,pgto,status,noivos,obs,comprovante:tempAnexo}
    DB.set(S.VENDAS,vendas)
    const ti=trans.findIndex(x=>x.ref===editId)
    if(ti>=0){trans[ti]={...trans[ti],val:totalF,data,pgto,desc:`Venda - ${clienteNome(cliId)}`};DB.set(S.TRANS,trans)}
    DB.set(S.PRODUTOS,prods)
    closeModal();toast('Venda atualizada!','ok')
  }else{
    descontarEstoque(itens,-1)
    const venda={id:genId(),cliId,data,itens,total,desc,totalF,pgto,status,noivos,obs,comprovante:tempAnexo}
    vendas.push(venda);DB.set(S.VENDAS,vendas)
    trans.push({id:genId(),tipo:'entrada',cat:'Venda',desc:`Venda - ${clienteNome(cliId)}`,val:totalF,data,pgto,ref:venda.id})
    DB.set(S.TRANS,trans)
    DB.set(S.PRODUTOS,prods)
    closeModal();toast('Venda registrada!','ok')
  }
  render('vendas')
}

    </div>`:''}`,
    `<button class="btn btn-s" onclick="closeModal()">Fechar</button><button class="btn btn-s" onclick="imprimirVenda('${v.id}')"><svg width="13" height="13" fill="none" viewBox="0 0 24 24"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg> Imprimir</button>`)
}

function excluirVenda(id){
  confirmarModal('Excluir esta venda? O estoque dos produtos será restaurado.',()=>{
    const venda=DB.get(S.VENDAS).find(x=>x.id===id)
    if(venda){
      const prods=DB.get(S.PRODUTOS)
      ;(venda.itens||[]).forEach(it=>{if(!it.pId||it.pId==='_custom')return;const i=prods.findIndex(p=>p.id===it.pId);if(i>=0)prods[i].estoque=Math.max(0,(prods[i].estoque||0)+(parseFloat(it.qtd)||0))})
      DB.set(S.PRODUTOS,prods)
    }
    DB.set(S.VENDAS,DB.get(S.VENDAS).filter(x=>x.id!==id))
    DB.set(S.TRANS,DB.get(S.TRANS).filter(x=>x.ref!==id))
    toast('Venda excluída e estoque restaurado','ok');render('vendas')
  })
}

        <button class="btn-ic" style="margin-right:4px" onclick="editOrc('${o.id}')"><svg width="13" height="13" fill="none" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button>

        <button class="btn-ic" style="margin-right:4px" title="Link p/ Cliente" onclick="gerarLinkOrc('${o.id}')"><svg width="13" height="13" fill="none" viewBox="0 0 24 24"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>

function renderOItens(){
  const el=document.getElementById('oItens');if(!el)return
  const prods=DB.get(S.PRODUTOS).filter(p=>p.ativo)
  el.innerHTML=tempItems.map((it,i)=>`
    <div style="border-top:1px solid var(--cream2)">
      <div style="display:grid;grid-template-columns:3fr 1fr 1.5fr 1fr 36px;gap:6px;padding:8px 11px;align-items:center">
        <select oninput="selectProdOrc(${i},this.value)" style="padding:5px 7px;border:1.5px solid var(--cream2);border-radius:6px;font-size:12px;font-family:inherit;outline:none;color:var(--txt);width:100%">
          <option value="">Selecionar do estoque...</option>
          ${prods.map(p=>`<option value="${p.id}" ${it.pId===p.id?'selected':''}>${p.nome}${p.preco>0?' — '+fmt(p.preco):''}</option>`).join('')}
          <option value="_custom" ${it.pId==='_custom'?'selected':''}>Outro (digitar)</option>
        </select>
        <input type="number" value="${it.qtd||1}" min="1" oninput="orcNumChange(${i},'qtd',this.value)">
        <input type="number" value="${it.pu||0}" min="0" step="0.01" oninput="orcNumChange(${i},'pu',this.value)">
        <span id="orc_sub_${i}" style="font-size:12px;color:var(--txt2);font-weight:600">${fmt(it.sub||0)}</span>
        <button class="btn-ic btn-d" onclick="removeOrcItem(${i})" style="padding:4px"><svg width="12" height="12" fill="none" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
      </div>
      ${it.pId==='_custom'?`<div style="padding:0 11px 8px"><input id="orc_nome_${i}" placeholder="Nome do item personalizado..." value="${it.nome||''}" oninput="tempItems[${i}].nome=this.value" style="width:100%;padding:6px 10px;border:1.5px solid var(--cara);border-radius:6px;font-size:12px;font-family:inherit;outline:none;color:var(--txt)"></div>`:''}
    </div>`).join('')
}
function selectProdOrc(i,pId){
  const prods=DB.get(S.PRODUTOS)
  if(pId&&pId!=='_custom'){
    const p=prods.find(x=>x.id===pId)
    if(p){tempItems[i].pId=pId;tempItems[i].nome=p.nome;tempItems[i].pu=p.preco>0?p.preco:(p.custo||0);tempItems[i].sub=(tempItems[i].qtd||1)*tempItems[i].pu}
  }else{tempItems[i].pId=pId||'';if(pId==='_custom')tempItems[i].nome=''}
  renderOItens();calcOrcTotals()
}
function orcNumChange(i,f,v){
  tempItems[i][f]=parseFloat(v)||0
  tempItems[i].sub=(tempItems[i].qtd||1)*(tempItems[i].pu||0)
  const span=document.getElementById(`orc_sub_${i}`)
  if(span)span.textContent=fmt(tempItems[i].sub)
  calcOrcTotals()
}
function addOrcItem(){tempItems.push({pId:'',nome:'',qtd:1,pu:0,sub:0});renderOItens();calcOrcTotals()}
function removeOrcItem(i){if(tempItems.length>1)tempItems.splice(i,1);else tempItems=[{pId:'',nome:'',qtd:1,pu:0,sub:0}];renderOItens();calcOrcTotals()}
function calcOrcTotals(){
  const total=tempItems.reduce((a,x)=>a+(x.sub||0),0)
  const desc=parseFloat((document.getElementById('oDesc')||{}).value)||0
  const el=document.getElementById('oTotals');if(!el)return
  el.innerHTML=`<div class="totbox"><div class="trow"><span>Subtotal</span><span>${fmt(total)}</span></div><div class="trow"><span>Desconto</span><span style="color:var(--bad)">- ${fmt(desc)}</span></div><div class="trow bold"><span>Total</span><span>${fmt(total-desc)}</span></div></div>`
}
function editOrc(id){
  const o=DB.get(S.ORCAMENTOS).find(x=>x.id===id);if(!o)return
  editId=id;tempItems=JSON.parse(JSON.stringify(o.itens))
  const clis=DB.get(S.CLIENTES)
  openModal('Editar Orçamento',`
    <div class="frow"><div class="fg"><label>Cliente</label><select id="oCli"><option value="">Selecione...</option>${clis.map(c=>`<option value="${c.id}" ${c.id===o.cliId?'selected':''}>${c.nome}</option>`).join('')}</select></div>
    <div class="fg"><label>Data</label><input type="date" id="oData" value="${o.data}"></div></div>
    <div class="frow"><div class="fg"><label>Validade</label><input type="date" id="oValid" value="${o.validade||''}"></div>
    <div class="fg"><label>Desconto (R$)</label><input type="number" id="oDesc" value="${o.desc||0}" min="0" oninput="calcOrcTotals()"></div></div>
    <div style="margin-bottom:8px;font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px">Itens do Orçamento</div>
    <div class="items-tbl"><div class="items-hdr"><span>Produto</span><span>Qtd</span><span>Preço Unit.</span><span>Subtotal</span><span></span></div><div id="oItens"></div></div>
    <button class="btn btn-s btn-sm" onclick="addOrcItem()">+ Item</button>
    <div style="margin-top:12px" id="oTotals"></div>
    <div class="fg" style="margin-top:10px"><label>Nome dos Noivos / Evento</label><input id="oNoivos" value="${o.noivos||''}" placeholder="Ex: Ana &amp; Carlos — Casamento 15/06"></div>
    <div class="fg" style="margin-top:8px"><label>Observações</label><textarea id="oObs" placeholder="Detalhes do orçamento...">${o.obs||''}</textarea></div>`,
    `<button class="btn btn-s" onclick="closeModal()">Cancelar</button><button class="btn btn-p" onclick="salvarOrc()">Atualizar Orçamento</button>`,true)
  renderOItens();calcOrcTotals()
}

function salvarOrc(){
  const cliId=(document.getElementById('oCli')||{}).value;const data=(document.getElementById('oData')||{}).value
  if(!cliId||!data){toast('Selecione cliente e data','err');return}
  const itens=tempItems.filter(x=>x.nome||x.sub>0)
  if(!itens.length){toast('Adicione ao menos um item','err');return}
  const total=itens.reduce((a,x)=>a+x.sub,0);const desc=parseFloat((document.getElementById('oDesc')||{}).value)||0
  const orcs=DB.get(S.ORCAMENTOS)
  if(editId){
    const idx=orcs.findIndex(x=>x.id===editId)
    if(idx>=0)orcs[idx]={...orcs[idx],cliId,data,validade:(document.getElementById('oValid')||{}).value,itens,total,desc,totalF:total-desc,noivos:v('oNoivos'),obs:(document.getElementById('oObs')||{}).value}
    DB.set(S.ORCAMENTOS,orcs);closeModal();toast('Orçamento atualizado!','ok')
  }else{
    const orc={id:genId(),cliId,data,validade:(document.getElementById('oValid')||{}).value,itens,total,desc,totalF:total-desc,status:'pendente',noivos:v('oNoivos'),obs:(document.getElementById('oObs')||{}).value}
    orcs.push(orc);DB.set(S.ORCAMENTOS,orcs);closeModal();toast('Orçamento salvo!','ok')
  }
  render('orcamentos')
}
function statusOrc(id,status){
  const orcs=DB.get(S.ORCAMENTOS);const i=orcs.findIndex(x=>x.id===id);if(i<0)return
  orcs[i].status=status;DB.set(S.ORCAMENTOS,orcs)
  // atualiza cor do select sem re-renderizar a tabela inteira
  const sels=document.querySelectorAll('.orc-st-sel')
  sels.forEach(sel=>{
    sel.classList.remove('orc-st-pendente','orc-st-aprovado','orc-st-recusado')
    sel.classList.add('orc-st-'+sel.value)
  })
  if(status==='aprovado'){
    toast('Orçamento aprovado!','ok')
    openModal('Orçamento Aprovado',
      `<p style="font-size:14px;color:var(--txt);line-height:1.6;padding:6px 0">O que deseja fazer agora?</p>
       <div style="display:flex;flex-direction:column;gap:8px;margin-top:4px">
         <div style="padding:10px 14px;background:var(--cream);border-radius:8px;border:1.5px solid var(--cream2);font-size:13px;color:var(--txt2)">🗒 <strong>Ordem de Serviço</strong> — para controlar a produção antes de entregar</div>
         <div style="padding:10px 14px;background:var(--cream);border-radius:8px;border:1.5px solid var(--cream2);font-size:13px;color:var(--txt2)">💰 <strong>Gerar Venda</strong> — registra pagamento e desconta do estoque</div>
       </div>`,
      `<button class="btn btn-s" onclick="closeModal();render('orcamentos')">Agora não</button>
       <button class="btn btn-s" style="background:var(--choc2);color:#fff;border-color:var(--choc2)" onclick="closeModal();gerarOS('${id}')">🗒 Gerar OS</button>
       <button class="btn btn-p" style="background:var(--ok)" onclick="closeModal();gerarVendaDeOrc('${id}')">💰 Gerar Venda</button>`)
  }else if(status==='recusado'){
    toast('Orçamento marcado como recusado','warn')
  }else{
    toast('Status atualizado para pendente','ok')
  }
}
function gerarVendaDeOrc(orcId){
  const o=DB.get(S.ORCAMENTOS).find(x=>x.id===orcId);if(!o)return
  if(DB.get(S.VENDAS).find(x=>x.orcId===orcId)){toast('Venda já gerada para este orçamento','warn');return}
  const pgtos=['Pix','Dinheiro','Cartão','Transferência']
  const stl='width:100%;padding:8px 10px;border:1.5px solid var(--cream2);border-radius:8px;font-size:14px;font-family:inherit;outline:none;color:var(--txt)'
  openModal('Gerar Venda do Orçamento',`
    <p style="font-size:13px;color:var(--txt2);margin-bottom:12px">Confirme os dados para registrar a venda de <strong>${fmt(o.totalF||o.total)}</strong>:</p>
    <div class="frow">
      <div class="fg"><label>Forma de Pagamento</label><select id="gvPgto" style="${stl}">${pgtos.map(p=>`<option>${p}</option>`).join('')}</select></div>
      <div class="fg"><label>Status</label><select id="gvStatus" style="${stl}"><option value="pago">Pago</option><option value="pendente">Pendente</option></select></div>
    </div>
    <div class="fg"><label>Data da Venda</label><input type="date" id="gvData" value="${today()}" style="${stl}"></div>`,
    `<button class="btn btn-s" onclick="closeModal()">Cancelar</button>
     <button class="btn btn-p" style="background:var(--ok)" onclick="confirmarGerarVendaDeOrc('${orcId}')">✓ Gerar Venda</button>`)
}
function confirmarGerarVendaDeOrc(orcId){
  const o=DB.get(S.ORCAMENTOS).find(x=>x.id===orcId);if(!o)return
  const pgto=(document.getElementById('gvPgto')||{}).value||'Pix'
  const status=(document.getElementById('gvStatus')||{}).value||'pago'
  const data=(document.getElementById('gvData')||{}).value||today()
  const venda={id:genId(),cliId:o.cliId,data,itens:o.itens,total:o.total,desc:o.desc||0,totalF:o.totalF||o.total,pgto,status,noivos:o.noivos||'',obs:o.obs||'',orcId}
  const vendas=DB.get(S.VENDAS);vendas.push(venda);DB.set(S.VENDAS,vendas)
  const trans=DB.get(S.TRANS)
  trans.push({id:genId(),tipo:'entrada',cat:'Venda',desc:`Venda - ${clienteNome(o.cliId)} (Orç.)`,val:venda.totalF,data,pgto,ref:venda.id})
  DB.set(S.TRANS,trans)
  const prods=DB.get(S.PRODUTOS)
  let descontados=0
  ;(o.itens||[]).forEach(it=>{if(!it.pId||it.pId==='_custom')return;const i=prods.findIndex(p=>p.id===it.pId);if(i>=0){prods[i].estoque=Math.max(0,(prods[i].estoque||0)-(parseFloat(it.qtd)||0));descontados++}})
  if(descontados>0)DB.set(S.PRODUTOS,prods)
  closeModal()
  toast(`Venda gerada! ${descontados>0?descontados+' item(s) descontado(s) do estoque.':''}`,'ok')
  render('vendas')
}
function excluirOrc(id){
  const o=DB.get(S.ORCAMENTOS).find(x=>x.id===id);if(!o)return

}

function prodForm(p){

  <div class="frow"><div class="fg"><label>Nome *</label><input id="pNome" value="${p.nome||''}" placeholder="Nome do item"></div>

}
function togglePrecoCampo(){
  const t=(document.getElementById('pTipo')||{}).value
  const el=document.getElementById('campoPreco')
  if(el)el.style.display=t==='ingrediente'?'none':''
}
function salvarProd(){
  const nome=(document.getElementById('pNome')||{}).value||''
  if(!nome.trim()){toast('Informe o nome','err');return}
  const tipo=(document.getElementById('pTipo')||{}).value||'produto'
  const p={id:editId||genId(),nome:nome.trim(),tipo,cat:(document.getElementById('pCat')||{}).value,un:(document.getElementById('pUn')||{}).value,preco:parseFloat((document.getElementById('pPreco')||{}).value)||0,custo:parseFloat((document.getElementById('pCusto')||{}).value)||0,estoque:parseFloat((document.getElementById('pEst')||{}).value)||0,minimo:parseFloat((document.getElementById('pMin')||{}).value)||0,ativo:true}
  const prods=DB.get(S.PRODUTOS);if(editId){const i=prods.findIndex(x=>x.id===editId);if(i>=0)prods[i]=p}else prods.push(p)
  DB.set(S.PRODUTOS,prods);closeModal();toast('Item salvo!','ok');estoqueTab=tipo;render('estoque')
}
function ajustarEstoque(id){
  const p=DB.get(S.PRODUTOS).find(x=>x.id===id);if(!p)return
  openModal(`Ajustar Estoque — ${p.nome}`,`
    <div style="margin-bottom:14px;padding:12px;background:var(--cream);border-radius:8px;display:flex;justify-content:space-between;align-items:center">
      <span style="color:var(--txt2)">Estoque atual:</span>
      <strong style="font-size:18px">${p.estoque} ${p.un}</strong>
    </div>
    <div class="fg"><label>Tipo de Ajuste</label><select id="ajTipo"><option value="set">Definir quantidade</option><option value="add">Adicionar ao estoque</option><option value="rem">Remover do estoque</option></select></div>
    <div class="fg"><label>Quantidade</label><input type="number" id="ajQtd" value="${p.estoque}" min="0" step="0.01" placeholder="Quantidade"></div>`,
    `<button class="btn btn-s" onclick="closeModal()">Cancelar</button><button class="btn btn-p" onclick="confirmarAjuste('${id}')">Confirmar</button>`)
}
function confirmarAjuste(id){
  const tipo=(document.getElementById('ajTipo')||{}).value;const qtd=parseFloat((document.getElementById('ajQtd')||{}).value)||0
  const prods=DB.get(S.PRODUTOS);const i=prods.findIndex(x=>x.id===id);if(i<0)return
  if(tipo==='set')prods[i].estoque=qtd
  else if(tipo==='add')prods[i].estoque+=qtd
  else prods[i].estoque=Math.max(0,prods[i].estoque-qtd)
  DB.set(S.PRODUTOS,prods);closeModal();toast('Estoque atualizado!','ok');render('estoque')
}
function excluirProd(id){
  if(!confirm('Excluir este item?'))return
  DB.set(S.PRODUTOS,DB.get(S.PRODUTOS).filter(x=>x.id!==id));toast('Item removido','ok');render('estoque')
}

function selectIngCmp(i,pId){
  if(pId==='__novo__'){
    tempItems[i]._novoMode=true;tempItems[i].pId='';tempItems[i].nome=''
    renderCItens()
    setTimeout(()=>{const inp=document.getElementById(`cNovoIngNome_${i}`);if(inp)inp.focus()},50)
    return
  }
  tempItems[i]._novoMode=false
  const ings=DB.get(S.PRODUTOS).filter(p=>p.tipo==='ingrediente')
  if(pId&&pId!=='_free'){const p=ings.find(x=>x.id===pId);if(p){tempItems[i].pId=pId;tempItems[i].nome=p.nome;if(!tempItems[i].und)tempItems[i].und=p.un||''}}
  else{tempItems[i].pId=pId||'';tempItems[i].nome=''}
  renderCItens();calcCmpTotals()
}
function salvarNovoIngCmp(i){
  const nome=((document.getElementById(`cNovoIngNome_${i}`)||{}).value||'').trim()
  if(!nome){toast('Informe o nome do ingrediente','err');return}
  const und=(document.getElementById(`cNovoIngUnd_${i}`)||{}).value||'g'
  const cat=((document.getElementById(`cNovoIngCat_${i}`)||{}).value||'').trim()
  const prods=DB.get(S.PRODUTOS)
  const existing=prods.find(p=>p.nome.toLowerCase()===nome.toLowerCase()&&p.tipo==='ingrediente')
  const id=existing?existing.id:genId()
  if(!existing){
    prods.push({id,nome,tipo:'ingrediente',und,cat,estoque:0,minimo:0,ativo:true,dt:today()})
    DB.set(S.PRODUTOS,prods)
  }
  tempItems[i]={...tempItems[i],pId:id,nome,_novoMode:false}
  renderCItens();calcCmpTotals()
  toast(`Ingrediente "${nome}" criado e selecionado!`,'ok')
}
function cancelarNovoIngCmp(i){
  tempItems[i]._novoMode=false;tempItems[i].pId='';tempItems[i].nome=''
  renderCItens()
}
function calcCustoUndStr(it){
  const qtd=parseFloat(it.qtd)||0;const valor=parseFloat(it.valor)||0;const und=it.und||''
  if(!qtd||!valor||!und)return'—'
  const custo=valor/qtd
  // mostra em und do estoque se tiver pId vinculado
  if(it.pId&&it.pId!=='_free'&&it.pId!==''){
    const prod=DB.get(S.PRODUTOS).find(p=>p.id===it.pId)
    if(prod&&prod.un&&prod.un!==und){
      const qtdEmEst=converterUnidade(qtd,und,prod.un)
      if(qtdEmEst>0)return`R$${(valor/qtdEmEst).toFixed(4)}/${prod.un}`
    }
  }
  return`R$${custo.toFixed(4)}/${und}`
}
function updateCmpItem(i,f,v){
  if(f!=='und')tempItems[i][f]=parseFloat(v)||0
  tempItems[i].sub=tempItems[i].valor||0
  const custoEl=document.getElementById('cCusto_'+i)
  if(custoEl){const s=calcCustoUndStr(tempItems[i]);custoEl.textContent=s;custoEl.style.color=s!=='—'?'var(--ok)':'var(--txt3)'}
  calcCmpTotals()
}
function addCmpItem(){tempItems.push({pId:'',nome:'',qtd:1,und:'',valor:0,sub:0});renderCItens();calcCmpTotals()}
function removeCmpItem(i){if(tempItems.length>1)tempItems.splice(i,1);else tempItems=[{pId:'',nome:'',qtd:1,und:'',valor:0,sub:0}];renderCItens();calcCmpTotals()}
function calcEmb(i){
  const n=parseFloat((document.getElementById('cEmb_n_'+i)||{}).value)||0
  const p=parseFloat((document.getElementById('cEmb_p_'+i)||{}).value)||0
  const u=(document.getElementById('cEmb_u_'+i)||{}).value||'g'
  tempItems[i]._nEmb=n||'';tempItems[i]._pesoEmb=p||'';tempItems[i]._embUnd=u
  const tot=document.getElementById('cEmb_tot_'+i)
  if(tot)tot.textContent=n&&p?((n*p)%1===0?(n*p):(n*p).toFixed(3))+' '+u:' —'
}
function aplicarEmb(i){
  const n=parseFloat((document.getElementById('cEmb_n_'+i)||{}).value)||0
  const p=parseFloat((document.getElementById('cEmb_p_'+i)||{}).value)||0
  const u=(document.getElementById('cEmb_u_'+i)||{}).value||'g'
  if(!n||!p){toast('Informe a quantidade e o peso por embalagem','err');return}
  const total=parseFloat((n*p).toFixed(6))
  tempItems[i].qtd=total;tempItems[i].und=u
  tempItems[i]._embMode=false
  renderCItens();calcCmpTotals()
  toast(`${n} × ${p}${u} = ${total}${u} aplicado!`,'ok')
}
function calcCmpTotals(){
  const total=tempItems.reduce((a,x)=>a+(x.sub||0),0)
  const parc=parseInt((document.getElementById('cParc')||{}).value||'1')||1
  const box=document.getElementById('cParcValBox')
  const valEl=document.getElementById('cParcVal')
  if(box)box.style.display=parc>1?'block':'none'
  if(valEl&&parc>1)valEl.textContent=fmt(total/parc)
  const el=document.getElementById('cTotals');if(!el)return
  el.innerHTML=`<div class="totbox">
    <div class="trow bold"><span>Total da Compra</span><span>${fmt(total)}</span></div>
    ${parc>1?`<div class="trow" style="color:var(--cara);font-weight:600"><span>${parc}× parcelas de</span><span>${fmt(total/parc)}</span></div>`:''}
  </div>`
}

    </div></div>
    <div style="margin-bottom:8px;font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px">Itens Comprados</div>

function salvarCompra(){
  const forn=(document.getElementById('cForn')||{}).value||''
  if(!forn.trim()){toast('Informe o fornecedor','err');return}
  const itens=tempItems.filter(x=>x.sub>0)
  if(!itens.length){toast('Adicione ao menos um item','err');return}
  const total=itens.reduce((a,x)=>a+x.sub,0)
  const data=(document.getElementById('cData')||{}).value
  const pgto=(document.getElementById('cPgto')||{}).value
  const parcelas=parseInt((document.getElementById('cParc')||{}).value||'1')||1
  const valorParcela=parcelas>1?total/parcelas:null
  const cmps=DB.get(S.COMPRAS);const prods=DB.get(S.PRODUTOS);const trans=DB.get(S.TRANS)
  if(editId){
    const old=cmps.find(x=>x.id===editId)
    // reverter estoque da compra antiga (com conversão de unidade)
    if(old)old.itens.forEach(it=>{if(it.pId&&it.pId!=='_free'){const i=prods.findIndex(x=>x.id===it.pId);if(i>=0){const qr=it.und?converterUnidade(it.qtd,it.und,prods[i].un)??it.qtd:it.qtd;prods[i].estoque=Math.max(0,prods[i].estoque-qr)}}})
    const idx=cmps.findIndex(x=>x.id===editId)
    cmps[idx]={id:editId,forn:forn.trim(),data,itens,total,pgto,parcelas,valorParcela,nf:(document.getElementById('cNf')||{}).value,obs:(document.getElementById('cObs')||{}).value,notaAnexo:tempAnexo}
    DB.set(S.COMPRAS,cmps)
    // aplicar estoque e custo: custo = valor_total / qtd_em_unidade_do_estoque
    itens.forEach(it=>{if(it.pId&&it.pId!=='_free'){const i=prods.findIndex(x=>x.id===it.pId);if(i>=0){const qtdEst=it.und?converterUnidade(it.qtd,it.und,prods[i].un)??it.qtd:it.qtd;prods[i].estoque+=qtdEst;if(it.valor>0&&qtdEst>0)prods[i].custo=it.valor/qtdEst}}})
    DB.set(S.PRODUTOS,prods)
    const ti=trans.findIndex(x=>x.ref===editId)
    if(ti>=0){trans[ti]={...trans[ti],val:total,data,pgto,desc:forn.trim()};DB.set(S.TRANS,trans)}
    closeModal();toast('Compra atualizada! Estoque e custo ajustados.','ok')
  }else{
    const cmp={id:genId(),forn:forn.trim(),data,itens,total,pgto,parcelas,valorParcela,nf:(document.getElementById('cNf')||{}).value,obs:(document.getElementById('cObs')||{}).value,notaAnexo:tempAnexo}
    cmps.push(cmp);DB.set(S.COMPRAS,cmps)
    // custo = valor_total / qtd_em_unidade_do_estoque
    itens.forEach(it=>{if(it.pId&&it.pId!=='_free'){const i=prods.findIndex(x=>x.id===it.pId);if(i>=0){const qtdEst=it.und?converterUnidade(it.qtd,it.und,prods[i].un)??it.qtd:it.qtd;prods[i].estoque+=qtdEst;if(it.valor>0&&qtdEst>0)prods[i].custo=it.valor/qtdEst}}})
    DB.set(S.PRODUTOS,prods)
    trans.push({id:genId(),tipo:'saida',cat:'Compra de insumos',desc:forn.trim(),val:total,data,pgto,ref:cmp.id})
    DB.set(S.TRANS,trans)
    closeModal();toast('Compra registrada! Estoque atualizado.','ok')
  }
  render('compras')
}

function excluirCompra(id){
  confirmarModal('Excluir esta compra? O estoque dos ingredientes será revertido.',()=>{
    const compra=DB.get(S.COMPRAS).find(x=>x.id===id)
    if(compra){
      const prods=DB.get(S.PRODUTOS)
      ;(compra.itens||[]).forEach(it=>{
        if(!it.pId||it.pId==='_free')return
        const i=prods.findIndex(p=>p.id===it.pId);if(i<0)return
        const qtdConv=it.und?converterUnidade(it.qtd,it.und,prods[i].un)??it.qtd:it.qtd
        prods[i].estoque=Math.max(0,(prods[i].estoque||0)-qtdConv)
      })
      DB.set(S.PRODUTOS,prods)
    }
    DB.set(S.COMPRAS,DB.get(S.COMPRAS).filter(x=>x.id!==id))
    DB.set(S.TRANS,DB.get(S.TRANS).filter(x=>x.ref!==id))
    toast('Compra removida e estoque revertido','ok');render('compras')
  })
}

function toast(msg,type=''){

}

function autoGerarOS(){
  const aprovados=DB.get(S.ORCAMENTOS).filter(o=>o.status==='aprovado')
  const orcIdsComOS=new Set(DB.get(S.OS).map(os=>os.orcId))
  const pendentes=aprovados.filter(o=>!orcIdsComOS.has(o.id))
  if(!pendentes.length)return 0
  const all=DB.get(S.OS)
  pendentes.forEach(o=>{
    const num=(all.length?Math.max(...all.map(x=>x.num)):0)+1
    all.push({id:genId(),num,orcId:o.id,cliId:o.cliId,data:today(),prazo:'',itens:JSON.parse(JSON.stringify(o.itens)),total:o.totalF,status:'aberta',noivos:o.noivos||'',obs:o.obs||'',responsavel:''})
  })
  DB.set(S.OS,all)
  return pendentes.length
}

function sincronizarOS(){
  const n=autoGerarOS()
  if(n>0){toast(`${n} nova(s) OS gerada(s)!`,'ok');renderOSBanner(n)}
  else toast('Nenhum orçamento aprovado pendente','warn')
  renderOSTable()
}

function gerarOS(orcId){
  const o=DB.get(S.ORCAMENTOS).find(x=>x.id===orcId);if(!o)return
  const orcIdsComOS=new Set(DB.get(S.OS).map(os=>os.orcId))
  if(orcIdsComOS.has(orcId)){toast('OS já gerada para este orçamento','warn');navigate('os');return}
  const all=DB.get(S.OS)
  const num=(all.length?Math.max(...all.map(x=>x.num)):0)+1
  all.push({id:genId(),num,orcId,cliId:o.cliId,data:today(),prazo:'',itens:JSON.parse(JSON.stringify(o.itens)),total:o.totalF,status:'aberta',noivos:o.noivos||'',obs:o.obs||'',responsavel:''})
  DB.set(S.OS,all);toast(`OS #${String(num).padStart(3,'0')} criada!`,'ok');navigate('os')
}
function updateStatusOS(id,status){
  const all=DB.get(S.OS);const i=all.findIndex(x=>x.id===id);if(i<0)return
  all[i].status=status;if(status==='concluida')all[i].dataConc=today()
  DB.set(S.OS,all);toast('Status atualizado!','ok');renderOSTable()
}
function excluirOS(id){
  const os=DB.get(S.OS).find(x=>x.id===id);if(!os)return
  confirmarModal(`Deseja excluir a <strong>OS #${String(os.num).padStart(3,'0')}</strong> de <strong>${clienteNome(os.cliId)}</strong>?<br><small style="color:var(--txt3)">Esta ação não pode ser desfeita.</small>`,()=>{
    DB.set(S.OS,DB.get(S.OS).filter(x=>x.id!==id))
    toast('OS excluída','ok');renderOSTable()
  })
}

  const os=DB.get(S.OS).find(x=>x.id===id);if(!os)return
  const lblOS={aberta:'Aberta',em_andamento:'Em Andamento',concluida:'Concluída',cancelada:'Cancelada'}
  openModal(`OS #${String(os.num).padStart(3,'0')}`,`

      <div><strong style="font-size:15px">${clienteNome(os.cliId)}</strong><div style="font-size:12px;color:var(--txt3)">Criada em ${fmtDate(os.data)}</div></div>

function salvarOS(id){
  const all=DB.get(S.OS);const i=all.findIndex(x=>x.id===id);if(i<0)return
  all[i].prazo=v('osPrazo');all[i].responsavel=v('osResp');all[i].obs=v('osObs')
  DB.set(S.OS,all);closeModal();toast('OS salva!','ok');render('os')
}

const REC_CATS=['Bolos','Tortas','Doces & Bombons','Brigadeiros','Salgados','Biscoitos & Cookies','Bebidas','Sobremesas','Outros']
const REC_UNIDS=['g','kg','ml','L','xícara','colher de sopa','colher de chá','unidade','fatia','pitada','a gosto']
const REC_DIFS=['Fácil','Médio','Difícil']
function getRecCats(){
  const custom=JSON.parse(localStorage.getItem('ds_rec_cats')||'[]')
  return [...REC_CATS,...custom]
}
function saveNewCat(nome){
  nome=(nome||'').trim();if(!nome)return null
  const all=getRecCats()
  if(all.map(x=>x.toLowerCase()).includes(nome.toLowerCase()))return nome
  const custom=JSON.parse(localStorage.getItem('ds_rec_cats')||'[]')
  custom.push(nome);localStorage.setItem('ds_rec_cats',JSON.stringify(custom))
  return nome
}
function handleRecCat(sel){
  document.getElementById('rCatNovaDiv').style.display=sel.value==='__nova__'?'flex':'none'
  if(sel.value!=='__nova__')document.getElementById('rCatNovaInput').value=''
}
function confirmarNovaCategoria(){
  const inp=document.getElementById('rCatNovaInput')
  const sel=document.getElementById('rCat')
  if(!inp||!sel)return
  const nome=saveNewCat(inp.value)
  if(!nome){toast('Digite o nome da categoria','err');return}
  // adiciona ao select se ainda não existir
  if(![...sel.options].find(o=>o.value===nome)){
    const opt=new Option(nome,nome)
    sel.insertBefore(opt,sel.querySelector('[value="__nova__"]'))
  }
  sel.value=nome
  document.getElementById('rCatNovaDiv').style.display='none'
  inp.value=''
  toast(`Categoria "${nome}" criada!`,'ok')
}
function cancelarNovaCategoria(){
  const sel=document.getElementById('rCat')
  if(sel)sel.selectedIndex=0
  document.getElementById('rCatNovaDiv').style.display='none'
}

  openModal('Nova Receita',receitaForm({}),

function editReceita(id){
  const r=DB.get(S.RECEITAS).find(x=>x.id===id);if(!r)return
  const estoqueIngs=DB.get(S.PRODUTOS).filter(p=>p.tipo==='ingrediente')
  editId=id
  tempIng=r.ingredientes&&r.ingredientes.length
    ?JSON.parse(JSON.stringify(r.ingredientes)).map(ing=>{
        if(!ing.pId||ing.pId===''){const m=estoqueIngs.find(p=>p.nome.toLowerCase().trim()===ing.nome.toLowerCase().trim());if(m)ing.pId=m.id}
        return ing
      })
    :[{qtd:'',und:'g',nome:'',pId:''}]
  tempAnexo=r.foto||null;tempAudioPrep=r.audioPrep||null;pararGravacao()
  openModal('Editar Receita',receitaForm(r),
    `<button class="btn btn-s" onclick="closeModal()">Cancelar</button><button class="btn btn-p" onclick="salvarReceita()">Atualizar Receita</button>`,true)
  renderIngredientes();renderAudioWidget();atualizarTotalCustoReceita()
}

function salvarPrecoVendaProduto(preco){
  const prodId=(document.getElementById('rProdId')||{}).value||''
  if(prodId){

function atualizarCustoIngred(i){
  const ing=tempIng[i];const el=document.getElementById('recCusto_'+i);if(!el)return
  if(!ing.pId||ing.pId==='_custom'){el.textContent='—';el.style.color='var(--txt3)'}
  else{
    const prod=DB.get(S.PRODUTOS).find(p=>p.id===ing.pId)
    if(!prod||!prod.custo){el.textContent='—';el.style.color='var(--txt3)'}
    else{
      const qtdConv=converterUnidade(parseFloat(ing.qtd)||0,ing.und,prod.un)
      const custo=qtdConv!=null&&qtdConv>0?qtdConv*prod.custo:null
      el.textContent=custo!=null?fmt(custo):'—'
      el.style.color=custo!=null?'var(--cara)':'var(--txt3)'
    }
  }
  _atualizarSpansCusto()
}
function _atualizarSpansCusto(){
  const{total,parcial,semCusto,porcoes,porLabel,custoPor}=_calcCustoBase()
  const elTotal=document.getElementById('recTotalVal')
  const elAviso=document.getElementById('recTotalAviso')
  const elPor=document.getElementById('recCustoPorcao')
  if(!elTotal)return
  if(total===0){document.getElementById('recCustoTotal').innerHTML='';return}
  elTotal.textContent=fmt(total)
  if(elAviso)elAviso.textContent=parcial?`(parcial — ${semCusto} sem custo)`:''
  if(elPor){elPor.textContent=porcoes>1?fmt(custoPor):'';const row=document.getElementById('recCustoPorcaoRow');if(row)row.style.display=porcoes>1?'flex':'none'}
  atualizarMarkupResult()
}
function _calcCustoBase(){
  const prods=DB.get(S.PRODUTOS)
  let total=0;let parcial=false;let semCusto=0
  tempIng.forEach(ing=>{
    if(!ing.pId||ing.pId==='_custom'){semCusto++;return}
    const prod=prods.find(p=>p.id===ing.pId)
    if(!prod||!prod.custo){semCusto++;return}
    const qtdConv=converterUnidade(parseFloat(ing.qtd)||0,ing.und,prod.un)
    if(qtdConv!=null&&qtdConv>0){total+=qtdConv*prod.custo;parcial=semCusto>0}
    else semCusto++
  })
  const rendStr=((document.getElementById('rRend')||{}).value||'').trim()
  const porcoes=parseFloat(rendStr.match(/[\d,.]+/)?.[0].replace(',','.'))||0
  const porLabel=rendStr.replace(/^[\d,.]+\s*/,'').trim()||'porção'
  return{total,parcial,semCusto,porcoes,porLabel,custoPor:porcoes>1?total/porcoes:total}
}

function renderAudioWidget(){
  const el=document.getElementById('audioWidgetBox');if(!el)return
  if(mediaRecorder&&mediaRecorder.state==='recording'){
    el.innerHTML=`<div class="audio-widget">
      <div style="display:flex;align-items:center;gap:10px">
        <span class="audio-pulse"></span>
        <span class="audio-timer" id="audioTimer">00:00</span>
        <span style="font-size:12px;color:var(--txt2)">Gravando áudio...</span>
        <button class="audio-btn-rec audio-btn-stop" onclick="pararGravacao()">⏹ Parar</button>
      </div>
    </div>`
  } else if(tempAudioPrep){
    el.innerHTML=`<div class="audio-widget">
      <div style="font-size:11px;color:var(--txt3);margin-bottom:4px">Áudio gravado</div>
      <audio controls src="${tempAudioPrep.data}" style="width:100%;height:36px;border-radius:6px"></audio>
      <div style="display:flex;gap:7px;margin-top:4px">
        <button class="audio-btn-rec" onclick="toggleGravacao()">🎤 Regravar</button>
        <button class="btn btn-s btn-sm" onclick="removerAudioPrep()">✕ Remover</button>
      </div>
    </div>`
  } else {
    el.innerHTML=`<div class="audio-widget">
      <div style="font-size:12px;color:var(--txt3);margin-bottom:6px">Grave um áudio com o modo de preparo em voz</div>
      <button class="audio-btn-rec" onclick="toggleGravacao()">🎤 Gravar Áudio</button>
    </div>`
  }
}
function toggleGravacao(){
  if(mediaRecorder&&mediaRecorder.state==='recording'){pararGravacao();return}
  startGravacao()
}
async function startGravacao(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true})
    audioChunks=[];recordingSec=0
    const mimeType=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':
                   MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':'audio/ogg'
    mediaRecorder=new MediaRecorder(stream,{mimeType})
    mediaRecorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data)}
    mediaRecorder.onstop=()=>{
      stream.getTracks().forEach(t=>t.stop())
      clearInterval(recordingTimer)
      const blob=new Blob(audioChunks,{type:mimeType})
      if(blob.size>4*1024*1024){toast('Áudio muito grande (máx. 4 MB)','err');tempAudioPrep=null;renderAudioWidget();return}
      const reader=new FileReader()
      reader.onload=ev=>{
        tempAudioPrep={data:ev.target.result,type:mimeType}
        renderAudioWidget()
        toast('Áudio gravado!','ok')
      }
      reader.readAsDataURL(blob)
    }
    mediaRecorder.start(250)
    recordingTimer=setInterval(()=>{
      recordingSec++
      const el=document.getElementById('audioTimer')
      if(el){const m=String(Math.floor(recordingSec/60)).padStart(2,'0');const s=String(recordingSec%60).padStart(2,'0');el.textContent=m+':'+s}
      if(recordingSec>=300){pararGravacao();toast('Limite de 5 min atingido','warn')}
    },1000)
    renderAudioWidget()
  }catch(err){
    toast('Permissão de microfone negada ou não disponível','err')
  }
}
function pararGravacao(){
  if(mediaRecorder&&mediaRecorder.state==='recording'){
    mediaRecorder.stop()
    mediaRecorder=null
    clearInterval(recordingTimer)
  }
}
function removerAudioPrep(){
  pararGravacao()
  tempAudioPrep=null
  renderAudioWidget()
}

function atualizarPreviewProd(id,lotes){
  lotes=Math.max(1,parseInt(lotes)||1)
  const r=DB.get(S.RECEITAS).find(x=>x.id===id);if(!r)return
  const el=document.getElementById('previewProdIngredientes');if(!el)return
  const ings=(r.ingredientes||[]).filter(x=>(x.pId&&x.pId!=='_custom')||x.nome&&x.nome.trim())
  if(!ings.length){el.innerHTML=`<div class="empty" style="padding:20px 0"><p>Esta receita não tem ingredientes cadastrados.</p></div>`;return}
  const prods=DB.get(S.PRODUTOS).filter(p=>p.tipo==='ingrediente')
  let temProblema=false;let custoTotal=0
  const rows=ings.map(ing=>{
    const qtdTotal=(parseFloat(ing.qtd)||0)*lotes
    const prod=ing.pId&&ing.pId!=='_custom'
      ?prods.find(p=>p.id===ing.pId)
      :prods.find(p=>p.nome.toLowerCase().trim()===(ing.nome||'').toLowerCase().trim())
    const estoqueAtual=prod!=null?prod.estoque:null
    const qtdConv=prod?converterUnidade(qtdTotal,ing.und,prod.un):null
    const estoqueApos=estoqueAtual!=null&&qtdConv!=null?estoqueAtual-qtdConv:null
    const custo=prod&&prod.custo>0&&qtdConv!=null?qtdConv*prod.custo:null
    if(custo!=null)custoTotal+=custo
    let status,cor
    if(prod==null){status='⚠ Não cadastrado';cor='var(--warn)';temProblema=true}
    else if(estoqueApos<0){status='⚠ Insuficiente';cor='var(--bad)';temProblema=true}
    else{status='✓ OK';cor='var(--ok)'}
    return`<tr>
      <td><strong>${ing.nome}</strong></td>
      <td style="text-align:center">${qtdTotal%1===0?qtdTotal:qtdTotal.toFixed(2)} ${ing.und}</td>
      <td style="text-align:center">${estoqueAtual!=null?estoqueAtual+(prod?(' '+prod.un):''):'—'}</td>
      <td style="text-align:center;font-weight:700">${estoqueApos!=null?(estoqueApos<0?'<span style="color:var(--bad)">'+estoqueApos.toFixed(2)+'</span>':estoqueApos.toFixed(2))+(prod?(' '+prod.un):''):'—'}</td>
      <td style="text-align:right;font-weight:700;color:var(--txt2)">${custo!=null?fmt(custo):'—'}</td>
      <td style="color:${cor};font-weight:700;font-size:11px;text-align:center">${status}</td>
    </tr>`
  }).join('')
  el.innerHTML=`
    ${temProblema?`<div style="background:#FFF3CD;border:1.5px solid #F0C000;border-radius:7px;padding:8px 12px;font-size:12px;color:#7A5A00;margin-bottom:10px;font-weight:600">⚠ Alguns ingredientes estão com estoque insuficiente ou não cadastrados. A produção vai descontar até o limite disponível.</div>`:''}
    <table style="font-size:12px">
      <thead><tr><th>Ingrediente</th><th style="text-align:center">Usar (${lotes} lote${lotes>1?'s':''})</th><th style="text-align:center">Estoque Atual</th><th style="text-align:center">Após Produção</th><th style="text-align:right">Custo</th><th style="text-align:center">Status</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    ${custoTotal>0?`<div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding:10px 14px;background:var(--cream);border-radius:8px;border:1.5px solid var(--cream2)">
      <span style="font-size:13px;font-weight:600;color:var(--txt2)">Custo total${lotes>1?' ('+lotes+' lotes)':''}</span>
      <span style="font-size:16px;font-weight:800;color:var(--cara)">${fmt(custoTotal)}</span>
    </div>`:''}
    ${(()=>{
      if(!r.prodId)return''
      const prod=DB.get(S.PRODUTOS).find(p=>p.id===r.prodId);if(!prod)return''
      const rendNum=parseFloat((r.rendimento||'').match(/[\d,.]+/)?.[0].replace(',','.'))||1
      const qtdProd=rendNum*lotes
      return`<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding:10px 14px;background:#EFF9F0;border-radius:8px;border:1.5px solid var(--ok)">
        <span style="font-size:13px;font-weight:600;color:var(--ok)">+ Entrada no estoque</span>
        <span style="font-size:14px;font-weight:800;color:var(--ok)">+${qtdProd%1===0?qtdProd:qtdProd.toFixed(2)} ${prod.un} de "${prod.nome}"</span>
      </div>`
    })()}`
}

function confirmarProducao(id){
  const r=DB.get(S.RECEITAS).find(x=>x.id===id);if(!r)return
  const lotes=Math.max(1,parseInt((document.getElementById('prodLotes')||{}).value)||1)
  const prods=DB.get(S.PRODUTOS)
  let descontados=0
  ;(r.ingredientes||[]).forEach(ing=>{
    const qtdTotal=(parseFloat(ing.qtd)||0)*lotes
    if(qtdTotal<=0)return
    const i=ing.pId&&ing.pId!=='_custom'
      ?prods.findIndex(p=>p.id===ing.pId)
      :prods.findIndex(p=>p.tipo==='ingrediente'&&p.nome.toLowerCase().trim()===(ing.nome||'').toLowerCase().trim())
    if(i>=0){const qtdConv=converterUnidade(qtdTotal,ing.und,prods[i].un);prods[i].estoque=Math.max(0,prods[i].estoque-(qtdConv!=null?qtdConv:qtdTotal));descontados++}
  })
  let msgProd=''
  if(r.prodId){
    const pi=prods.findIndex(p=>p.id===r.prodId)
    if(pi>=0){
      const rendNum=parseFloat((r.rendimento||'').match(/[\d,.]+/)?.[0].replace(',','.'))||1
      const qtdProd=rendNum*lotes
      prods[pi].estoque=(prods[pi].estoque||0)+qtdProd
      msgProd=` · +${qtdProd%1===0?qtdProd:qtdProd.toFixed(2)} ${prods[pi].un} de "${prods[pi].nome}"`
    }
  }
  DB.set(S.PRODUTOS,prods)
  closeModal()
  toast(`${lotes} lote${lotes>1?'s':''} produzido${lotes>1?'s':''}! ${descontados} ingrediente${descontados!==1?'s':''} descontado${descontados!==1?'s':''}${msgProd}.`,'ok')
}

function _ytId(url){
  if(!url)return null
  const m=url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([A-Za-z0-9_-]{11})/)
  return m?m[1]:null
}

function gerarLinkOrc(id){
  const o=DB.get(S.ORCAMENTOS).find(x=>x.id===id);if(!o)return
  const cli=DB.get(S.CLIENTES).find(x=>x.id===o.cliId)||{}
  const e=getEmpresa()
  // Payload mínimo: só inclui campos não-vazios; itens como arrays [nome,qtd,sub]
  const p={}
  const _en=e.fantasia||e.nome||'';if(_en)p.n=_en
  if(e.fone)p.ef=e.fone;if(e.email)p.ee=e.email;if(e.wa)p.ew=e.wa
  p.i=o.id.slice(-4).toUpperCase();p.v=o.validade;p.t=o.total
  if(o.desc)p.d=o.desc;p.tf=o.totalF
  if(o.obs)p.ob=o.obs
  p.it=o.itens.map(x=>[x.nome||x.desc||'',x.qtd,x.sub])
  if(cli.nome)p.cn=cli.nome;if(cli.fone)p.cf=cli.fone
  const url=`${location.origin}${location.pathname}#orcview=${btoa(unescape(encodeURIComponent(JSON.stringify(p)))).replace(/=+$/,'')}`
  openModal('Link para o Cliente',`
    <div style="margin-bottom:14px;padding:12px;background:var(--cream);border-radius:8px;font-size:12px;color:var(--txt2)">
      Compartilhe este link com o cliente. Ele poderá visualizar e aprovar o orçamento.
    </div>
    <div class="fg"><label>Link do Orçamento</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input id="linkUrl" value="${url}" readonly style="flex:1;font-size:11px;background:var(--cream)">
        <button class="btn btn-s btn-sm" onclick="copiarLink()">Copiar</button>
      </div>
    </div>
    ${e.wa?`<div style="margin-top:12px"><a href="https://wa.me/${e.wa.replace(/\D/g,'')}?text=${encodeURIComponent('Olá! Segue o link do seu orçamento: '+url)}" target="_blank" class="btn btn-ok" style="width:100%;justify-content:center;text-decoration:none;display:flex">Enviar via WhatsApp</a></div>`:'<div style="font-size:12px;color:var(--txt3);margin-top:8px">Dica: cadastre o WhatsApp em Minha Empresa para envio direto.</div>'}`,
    `<button class="btn btn-s" onclick="closeModal()">Fechar</button>`)
}
function copiarLink(){
  const el=document.getElementById('linkUrl');if(!el)return
  navigator.clipboard.writeText(el.value).then(()=>toast('Link copiado!','ok')).catch(()=>{el.select();document.execCommand('copy');toast('Link copiado!','ok')})
}
function checkClientView(){
  const hash=location.hash
  if(!hash.startsWith('#orcview='))return
  try{
    const b64=hash.slice(9).replace(/-/g,'+').replace(/_/g,'/');const pad=b64.length%4?'='.repeat(4-b64.length%4):'';
    const data=JSON.parse(decodeURIComponent(escape(atob(b64+pad))))
    showClientView(data)
  }catch(err){console.error(err)}
}

function setRelTab(tab,el){
  relTab=tab

function getRelDatas(){
  return{de:v('relDe')||thisMonth()+'-01',ate:v('relAte')||today()}
}
function renderRelatorio(){
  const {de,ate}=getRelDatas()
  const el=document.getElementById('relContent');if(!el)return
  if(relTab==='vendas')el.innerHTML=relVendasHTML(de,ate)
  else if(relTab==='financeiro')el.innerHTML=relFinHTML(de,ate)

  else el.innerHTML=relCliHTML(de,ate)
}
function relVendasHTML(de,ate){
  const vs=DB.get(S.VENDAS).filter(v=>v.data>=de&&v.data<=ate).sort((a,b)=>b.data.localeCompare(a.data))
  const total=vs.reduce((a,v)=>a+v.totalF,0)

    <div class="stat r"><div class="stat-lbl">Pendentes</div><div class="stat-val">${fmt(pendentes.reduce((a,v)=>a+v.totalF,0))}</div><div class="stat-sub">${pendentes.length} venda(s)</div></div>
