<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DoceSistema — Gestão de Confeitaria</title>
<style>
:root{--choc:#1A0E08;--choc2:#2E1810;--choc3:#4A2C1E;--cara:#C4724A;--cara2:#E8A87A;--cream:#FBF6F0;--cream2:#F0E6D8;--ivory:#FDFAF6;--txt:#1A0E08;--txt2:#5A3E30;--txt3:#9A7A68;--white:#FFFFFF;--ok:#4A8A65;--warn:#C4724A;--bad:#B84040;--sw:260px;--hh:64px;--r:12px;--sh:0 2px 16px rgba(26,14,8,.08);--shm:0 4px 28px rgba(26,14,8,.14)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Trebuchet MS','Calibri',sans-serif;background:var(--cream);color:var(--txt);min-height:100vh;display:flex}
.sidebar{width:var(--sw);background:var(--choc);min-height:100vh;position:fixed;left:0;top:0;display:flex;flex-direction:column;z-index:100;transition:transform .3s}
.slogo{padding:22px 18px 18px;border-bottom:1px solid rgba(255,255,255,.07)}
.slogo-icon{width:42px;height:42px;background:var(--cara);border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.slogo h1{font-family:'Palatino Linotype',Palatino,serif;font-size:16px;color:var(--cream);line-height:1.2;letter-spacing:.3px}
.slogo p{font-size:11px;color:rgba(255,255,255,.35);margin-top:3px}
.snav{flex:1;padding:14px 10px;overflow-y:auto}
.snav-lbl{font-size:10px;letter-spacing:1.8px;text-transform:uppercase;color:rgba(255,255,255,.28);padding:12px 10px 5px}
.ni{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.55);font-size:13.5px;transition:all .15s;margin-bottom:1px;user-select:none}
.ni:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.88)}
.ni.active{background:var(--cara);color:#fff}
.ni svg{flex-shrink:0;opacity:.8}
.ni.active svg{opacity:1}
.sfooter{padding:14px 12px;border-top:1px solid rgba(255,255,255,.07);font-size:11px;color:rgba(255,255,255,.25);text-align:center}
.main{margin-left:var(--sw);flex:1;min-height:100vh;display:flex;flex-direction:column}
.hdr{height:var(--hh);background:var(--white);border-bottom:1px solid var(--cream2);display:flex;align-items:center;justify-content:space-between;padding:0 26px;position:sticky;top:0;z-index:50;box-shadow:0 1px 0 var(--cream2)}
.hdr-title{font-family:'Palatino Linotype',Palatino,serif;font-size:19px;color:var(--choc)}
.hdr-sub{font-size:11px;color:var(--txt3);margin-top:1px}
.content{flex:1;padding:26px;overflow-y:auto}
.page{display:none;animation:fadeIn .2s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;gap:12px;flex-wrap:wrap}
.ph h2{font-family:'Palatino Linotype',Palatino,serif;font-size:21px;color:var(--choc)}
.ph p{font-size:12px;color:var(--txt3);margin-top:3px}
.ph-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:22px}
.stat{background:var(--white);border-radius:var(--r);padding:18px;box-shadow:var(--sh);border:1px solid var(--cream2);position:relative;overflow:hidden}
.stat::after{content:'';position:absolute;top:0;right:0;width:4px;height:100%;background:var(--cara)}
.stat.g::after{background:var(--ok)}.stat.r::after{background:var(--bad)}.stat.b::after{background:#5478A8}
.stat-lbl{font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.stat-val{font-family:'Palatino Linotype',Palatino,serif;font-size:26px;color:var(--choc);line-height:1}
.stat-sub{font-size:11px;color:var(--txt3);margin-top:5px}
.card{background:var(--white);border-radius:var(--r);padding:18px;box-shadow:var(--sh);border:1px solid var(--cream2)}
.card-title{font-family:'Palatino Linotype',Palatino,serif;font-size:14px;color:var(--choc);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:0}
.dgrid .full{grid-column:1/-1}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-family:inherit;font-weight:600;transition:all .15s;white-space:nowrap}
.btn-p{background:var(--cara);color:#fff}.btn-p:hover{background:var(--cara2);transform:translateY(-1px)}
.btn-s{background:var(--cream2);color:var(--txt)}.btn-s:hover{background:#E0D0C0}
.btn-d{background:#FCEAEA;color:var(--bad)}.btn-d:hover{background:#F8D0D0}
.btn-ok{background:#E8F4EE;color:var(--ok)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-ic{padding:7px;border-radius:7px;background:var(--cream2);color:var(--txt2);border:none;cursor:pointer;display:inline-flex;transition:background .15s}
.btn-ic:hover{background:var(--cream)}
.tbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.srch{position:relative;flex:1;min-width:180px;max-width:280px}
.srch input{width:100%;padding:8px 11px 8px 32px;border:1.5px solid var(--cream2);border-radius:8px;font-size:13px;font-family:inherit;background:var(--cream);outline:none;transition:all .15s;color:var(--txt)}
.srch input:focus{border-color:var(--cara);background:var(--white)}
.srch svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--txt3)}
.tc{overflow-x:auto;border-radius:var(--r)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--cream);color:var(--txt3);font-size:11px;text-transform:uppercase;letter-spacing:.7px;padding:9px 13px;text-align:left;border-bottom:1px solid var(--cream2)}
tbody tr{border-bottom:1px solid var(--cream2);transition:background .1s}
tbody tr:hover{background:var(--cream)}
tbody tr:last-child{border-bottom:none}
tbody td{padding:11px 13px;color:var(--txt)}
.bdg{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.bdg-g{background:#E8F4EE;color:#2E7D52}.bdg-y{background:#FFF3E0;color:#B05000}.bdg-r{background:#FCEAEA;color:var(--bad)}.bdg-b{background:#E3F2FD;color:#1565C0}.bdg-gr{background:var(--cream2);color:var(--txt2)}
.modal-ov{position:fixed;inset:0;background:rgba(26,14,8,.52);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;padding:16px}
.modal-ov.open{opacity:1;pointer-events:all}
.modal{background:var(--white);border-radius:16px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:0 24px 64px rgba(26,14,8,.28);transform:translateY(14px) scale(.98);transition:transform .2s ease}
.modal-ov.open .modal{transform:translateY(0) scale(1)}
.modal-lg{max-width:700px}
.mhdr{padding:18px 22px 14px;border-bottom:1px solid var(--cream2);display:flex;align-items:center;justify-content:space-between}
.mhdr h2{font-family:'Palatino Linotype',Palatino,serif;font-size:17px;color:var(--choc)}
.mbody{padding:18px 22px}
.mfooter{padding:14px 22px;border-top:1px solid var(--cream2);display:flex;justify-content:flex-end;gap:10px}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.fg label{font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg select,.fg textarea{padding:8px 11px;border:1.5px solid var(--cream2);border-radius:8px;font-size:13px;font-family:inherit;color:var(--txt);background:var(--white);transition:border-color .15s;outline:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--cara)}
.fg textarea{resize:vertical;min-height:72px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.frow.t3{grid-template-columns:1fr 1fr 1fr}
.frow.s1{grid-template-columns:1fr}
.toast-wrap{position:fixed;bottom:22px;right:22px;z-index:500;display:flex;flex-direction:column;gap:7px}
.toast{display:flex;align-items:center;gap:9px;background:var(--choc);color:var(--cream);padding:11px 15px;border-radius:9px;font-size:13px;box-shadow:var(--shm);animation:tin .3s ease;min-width:240px}
.toast.ok{background:var(--ok)}.toast.err{background:var(--bad)}.toast.warn{background:var(--warn)}
@keyframes tin{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes tout{from{transform:translateX(0);opacity:1}to{transform:translateX(100%);opacity:0}}
.toast.out{animation:tout .3s ease forwards}
.items-tbl{border:1.5px solid var(--cream2);border-radius:8px;overflow:hidden;margin-bottom:10px}
.items-hdr{display:grid;grid-template-columns:3fr 1fr 1.5fr 1fr 36px;gap:6px;padding:7px 11px;background:var(--cream);font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--txt3);font-weight:700}
.items-row{display:grid;grid-template-columns:3fr 1fr 1.5fr 1fr 36px;gap:6px;padding:7px 11px;align-items:center;border-top:1px solid var(--cream2)}
.items-row input,.items-row select{padding:5px 7px;border:1.5px solid var(--cream2);border-radius:6px;font-size:12px;font-family:inherit;width:100%;outline:none;color:var(--txt)}
.items-row input:focus,.items-row select:focus{border-color:var(--cara)}
.totbox{background:var(--cream);border-radius:8px;padding:11px 15px}
.trow{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;color:var(--txt2)}
.trow.bold{font-weight:700;font-size:15px;color:var(--choc);border-top:1px solid var(--cream2);margin-top:6px;padding-top:8px}
.tabs{display:flex;gap:3px;background:var(--cream2);padding:4px;border-radius:9px;margin-bottom:15px;width:fit-content}
.tab{padding:6px 15px;border-radius:6px;font-size:13px;cursor:pointer;color:var(--txt2);transition:all .15s;user-select:none}
.tab.active{background:var(--white);color:var(--choc);font-weight:600;box-shadow:var(--sh)}
.pbar-wrap{background:var(--cream2);border-radius:20px;height:5px;overflow:hidden;flex:1}
.pbar-fill{height:100%;border-radius:20px;background:var(--cara);transition:width .4s}
.pbar-fill.low{background:var(--bad)}
.empty{text-align:center;padding:52px 20px;color:var(--txt3)}
.empty svg{margin:0 auto 14px;display:block;opacity:.35}
.empty h3{font-family:'Palatino Linotype',Palatino,serif;font-size:17px;margin-bottom:5px;color:var(--txt2)}
.empty p{font-size:13px}
.fin-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--cream2)}
.fin-row:last-child{border-bottom:none}
.fin-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.fin-amt{font-size:14px;font-weight:700}
.fin-amt.inc{color:var(--ok)}.fin-amt.exp{color:var(--bad)}
.sel-filter{padding:7px 10px;border:1.5px solid var(--cream2);border-radius:8px;font-size:13px;font-family:inherit;background:var(--cream);color:var(--txt);outline:none;cursor:pointer}
.sel-filter:focus{border-color:var(--cara)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--cream2);border-radius:3px}
@media(max-width:768px){:root{--sw:0px}.sidebar{transform:translateX(-260px);width:260px!important}.sidebar.open{transform:translateX(0)}.main{margin-left:0}.stats-grid{grid-template-columns:1fr 1fr}.dgrid{grid-template-columns:1fr}.dgrid .full{grid-column:auto}.frow{grid-template-columns:1fr}.frow.t3{grid-template-columns:1fr}}
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="slogo">
    <div class="slogo-icon">
      <svg width="22" height="22" fill="none" viewBox="0 0 24 24"><path d="M12 2C9.5 2 8 4 8 5.5c0 .83.5 1.5 1 2H7a2 2 0 00-2 2v1a3 3 0 003 3h8a3 3 0 003-3v-1a2 2 0 00-2-2h-2c.5-.5 1-1.17 1-2C16 4 14.5 2 12 2z" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/><rect x="5" y="14" width="14" height="8" rx="2" stroke="#fff" stroke-width="1.5"/><path d="M9 14v8M15 14v8" stroke="#fff" stroke-width="1"/></svg>
    </div>
    <h1>DoceSistema</h1>
    <p>Gestão de Confeitaria</p>
  </div>
  <nav class="snav">
    <div class="snav-lbl">Principal</div>
    <div class="ni active" data-page="dashboard" onclick="navigate('dashboard')">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/><rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/><rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/></svg>
      Dashboard
    </div>
    <div class="snav-lbl">Operações</div>
    <div class="ni" data-page="vendas" onclick="navigate('vendas')">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      Vendas
    </div>
    <div class="ni" data-page="orcamentos" onclick="navigate('orcamentos')">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M14 3H7a2 2 0 00-2 2v14a2 2 0 002 2h10a2 2 0 002-2V8l-5-5z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M14 3v5h5M9 13h6M9 17h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Orçamentos
    </div>
    <div class="ni" data-page="clientes" onclick="navigate('clientes')">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="1.8"/><path d="M3 21v-1a6 6 0 0112 0v1M16 3.13a4 4 0 010 7.75M21 21v-1a4 4 0 00-3-3.87" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      Clientes
    </div>
    <div class="snav-lbl">Estoque</div>
    <div class="ni" data-page="estoque" onclick="navigate('estoque')">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M20 7H4a1 1 0 00-1 1v11a1 1 0 001 1h16a1 1 0 001-1V8a1 1 0 00-1-1zM16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M12 12v4M10 14h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      Estoque
    </div>
    <div class="ni" data-page="compras" onclick="navigate('compras')">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Compras
    </div>
    <div class="snav-lbl">Financeiro</div>
    <div class="ni" data-page="financeiro" onclick="navigate('financeiro')">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" stroke="currentColor" stroke-width="1.8"/><path d="M12 6v2m0 8v2M8.93 8.93l1.41 1.41m3.32 3.32l1.41 1.41M6 12h2m8 0h2M8.93 15.07l1.41-1.41m3.32-3.32l1.41-1.41" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Financeiro
    </div>
    <div class="snav-lbl">Produção</div>
    <div class="ni" data-page="os" onclick="navigate('os')">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>

      <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Relatórios

    <div class="snav-lbl">Configurações</div>
    <div class="ni" data-page="empresa" onclick="navigate('empresa')">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M9 22V12h6v10" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>

  <div class="sfooter">DoceSistema v1.0 · 2025</div>
</aside>

<main class="main">
  <header class="hdr">
    <div style="display:flex;align-items:center;gap:10px">
      <button class="btn-ic" id="menuBtn" onclick="toggleMenu()" style="display:none">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>

        <div class="hdr-title" id="hdrTitle">Dashboard</div>
        <div class="hdr-sub" id="hdrDate"></div>
      </div>

      <div style="font-size:12px;color:var(--txt3)" id="hdrGreet"></div>

  <div class="content" id="mainContent">
    <div class="page active" id="page-dashboard"></div>
    <div class="page" id="page-vendas"></div>

  <div class="modal" id="modalBox">
    <div class="mhdr"><h2 id="mTitle">Modal</h2><button class="btn-ic" onclick="closeModal()"><svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button></div>

<script>
// ===== CONSTANTS =====
const S={CLIENTES:'ds_cli',PRODUTOS:'ds_prod',VENDAS:'ds_vnd',ORCAMENTOS:'ds_orc',COMPRAS:'ds_cmp',TRANS:'ds_trn',OS:'ds_os',EMPRESA:'ds_emp'}
const PTITLES={dashboard:'Dashboard',vendas:'Vendas',orcamentos:'Orçamentos',clientes:'Clientes',estoque:'Estoque',compras:'Compras',financeiro:'Financeiro',os:'Ordens de Serviço',relatorios:'Relatórios',empresa:'Minha Empresa'}

// ===== DB =====
const DB={get:k=>JSON.parse(localStorage.getItem(k)||'[]'),set:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),clear:k=>localStorage.removeItem(k)}

// ===== STATE =====
let page='dashboard', tempItems=[], editId=null, estoqueTab='produto', finTab='todos'

// ===== UTILS =====
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function fmt(n){return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(n||0)}
function fmtN(n){return new Intl.NumberFormat('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n||0)}
function fmtDate(d){if(!d)return'-';return new Date(d+'T12:00:00').toLocaleDateString('pt-BR')}
function today(){return new Date().toISOString().split('T')[0]}
function thisMonth(){return today().slice(0,7)}
function clienteNome(id){const c=DB.get(S.CLIENTES).find(x=>x.id===id);return c?c.nome:'(Cliente não encontrado)'}
function prodNome(id){const p=DB.get(S.PRODUTOS).find(x=>x.id===id);return p?p.nome:'-'}

// ===== SAMPLE DATA =====
function initSample(){
  if(localStorage.getItem('ds_init'))return

// ===== ROUTER =====
function navigate(p){
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'))
  document.querySelectorAll('.page').forEach(pg=>pg.classList.remove('active'))
  const ni=document.querySelector(`[data-page="${p}"]`)
  if(ni)ni.classList.add('active')
  const pg=document.getElementById('page-'+p)
  if(pg)pg.classList.add('active')
  document.getElementById('hdrTitle').textContent=PTITLES[p]||p
  page=p
  render(p)
}
function render(p){
  const el=document.getElementById('page-'+p)
  if(!el)return
  switch(p){
    case'dashboard':el.innerHTML=dashHTML();bindDash();break
    case'vendas':el.innerHTML=vendasHTML();bindVendas();break
    case'orcamentos':el.innerHTML=orcHTML();bindOrc();break
    case'clientes':el.innerHTML=cliHTML();bindCli();break
    case'estoque':el.innerHTML=estHTML();bindEst();break
    case'compras':el.innerHTML=cmpHTML();bindCmp();break
    case'financeiro':el.innerHTML=finHTML();bindFin();break
    case'os':el.innerHTML=osHTML();bindOS();break
    case'relatorios':el.innerHTML=relHTML();bindRel();break
    case'empresa':el.innerHTML=empresaHTML();break
  }
}

function dashHTML(){
  const v=DB.get(S.VENDAS),t=DB.get(S.TRANS),p=DB.get(S.PRODUTOS)
  const mes=thisMonth()
  const ent=t.filter(x=>x.tipo==='entrada'&&x.data.startsWith(mes)).reduce((a,x)=>a+x.val,0)
  const sai=t.filter(x=>x.tipo==='saida'&&x.data.startsWith(mes)).reduce((a,x)=>a+x.val,0)
  const vendMes=v.filter(x=>x.data.startsWith(mes)).reduce((a,x)=>a+x.totalF,0)
  const qtdVendMes=v.filter(x=>x.data.startsWith(mes)).length
  const baixo=p.filter(x=>x.estoque<=x.minimo)
  const recentes=v.slice(-5).reverse()
  // mini chart: last 7 days sales
  const days=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(d.toISOString().split('T')[0])}
  const daySales=days.map(d=>v.filter(x=>x.data===d).reduce((a,x)=>a+x.totalF,0))
  const maxSale=Math.max(...daySales,1)
  const barH=daySales.map(s=>Math.round((s/maxSale)*90))
  const dayNames=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb']
  return`
  <div class="stats-grid">
    <div class="stat g"><div class="stat-lbl">Receitas do Mês</div><div class="stat-val">${fmt(ent)}</div><div class="stat-sub">Entradas em ${mes.slice(5)}/2025</div></div>
    <div class="stat r"><div class="stat-lbl">Despesas do Mês</div><div class="stat-val">${fmt(sai)}</div><div class="stat-sub">Saídas em ${mes.slice(5)}/2025</div></div>
    <div class="stat"><div class="stat-lbl">Lucro do Mês</div><div class="stat-val" style="color:${ent-sai>=0?'var(--ok)':'var(--bad)'}">${fmt(ent-sai)}</div><div class="stat-sub">Receitas - Despesas</div></div>
    <div class="stat b"><div class="stat-lbl">Vendas no Mês</div><div class="stat-val">${fmt(vendMes)}</div><div class="stat-sub">${qtdVendMes} pedido${qtdVendMes!==1?'s':''}</div></div>
  </div>
  <div class="dgrid">
    <div class="card full">
      <div class="card-title">Vendas — Últimos 7 Dias
        <span style="font-size:12px;color:var(--txt3);font-family:inherit">Total: ${fmt(daySales.reduce((a,b)=>a+b,0))}</span>
      </div>
      <div style="display:flex;align-items:flex-end;gap:8px;height:110px;padding:0 4px">
        ${days.map((d,i)=>`
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end">
            <div style="font-size:10px;color:var(--txt3)">${daySales[i]>0?fmt(daySales[i]).replace('R$','').trim():''}</div>
            <div style="width:100%;background:var(--cara);border-radius:4px 4px 0 0;height:${barH[i]}px;min-height:3px;opacity:${daySales[i]>0?1:0.3};transition:height .4s"></div>
            <div style="font-size:10px;color:var(--txt3)">${dayNames[new Date(d+'T12:00:00').getDay()]}</div>
          </div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-title">Últimas Vendas</div>
      ${recentes.length===0?`<div class="empty"><p>Nenhuma venda ainda</p></div>`:`
      <div style="display:flex;flex-direction:column;gap:0">
        ${recentes.map(v=>`
          <div class="fin-row">
            <div>
              <div style="font-size:13px;font-weight:600">${clienteNome(v.cliId)}</div>
              <div style="font-size:11px;color:var(--txt3)">${fmtDate(v.data)} · ${v.pgto}</div>
            </div>
            <div style="text-align:right">
              <div style="font-weight:700;color:var(--ok)">${fmt(v.totalF)}</div>
              <div>${v.status==='pago'?'<span class="bdg bdg-g">Pago</span>':'<span class="bdg bdg-y">Pendente</span>'}</div>
            </div>
          </div>`).join('')}
      </div>`}
    </div>
    <div class="card">
      <div class="card-title">Estoque Crítico
        ${baixo.length>0?`<span class="bdg bdg-r">${baixo.length} ite${baixo.length>1?'ns':'m'}</span>`:''}
      </div>
      ${baixo.length===0?`<div class="empty"><svg width="36" height="36" fill="none" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/></svg><p>Estoque OK!</p></div>`:`
      ${baixo.slice(0,6).map(p=>`
        <div class="fin-row">
          <div>
            <div style="font-size:13px;font-weight:600">${p.nome}</div>
            <div style="font-size:11px;color:var(--txt3)">${p.estoque} ${p.un} · mín: ${p.minimo}</div>
          </div>
          <div style="width:80px">
            <div class="pbar-wrap"><div class="pbar-fill low" style="width:${Math.min(100,Math.round((p.estoque/p.minimo)*100))}%"></div></div>
          </div>
        </div>`).join('')}`}
    </div>
  </div>`
}

function renderVItens(prods){
  const el=document.getElementById('vItens');if(!el)return
  el.innerHTML=tempItems.map((it,i)=>`
    <div class="items-row">
      <select oninput="selectProdVenda(${i},this.value)" style="padding:5px 7px;border:1.5px solid var(--cream2);border-radius:6px;font-size:12px;font-family:inherit;outline:none;color:var(--txt)">
        <option value="">Selecionar produto...</option>
        ${prods.map(p=>`<option value="${p.id}" ${it.pId===p.id?'selected':''}>${p.nome} — ${fmt(p.preco)}</option>`).join('')}
        <option value="_custom" ${it.pId==='_custom'?'selected':''}>Outro (digitar)</option>
      </select>
      <input type="number" value="${it.qtd||1}" min="1" oninput="updateItemVenda(${i},'qtd',this.value)">
      <input type="number" value="${it.pu||0}" min="0" step="0.01" oninput="updateItemVenda(${i},'pu',this.value)">
      <span style="font-size:12px;color:var(--txt2);font-weight:600">${fmt(it.sub||0)}</span>
      <button class="btn-ic btn-d" onclick="removeItemVenda(${i})" style="padding:4px"><svg width="12" height="12" fill="none" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
    </div>`).join('')
}

function selectProdVenda(i,pId){
  const prods=DB.get(S.PRODUTOS)
  if(pId&&pId!=='_custom'){
    const p=prods.find(x=>x.id===pId)
    if(p){tempItems[i].pId=pId;tempItems[i].nome=p.nome;tempItems[i].pu=p.preco;tempItems[i].sub=(tempItems[i].qtd||1)*p.preco}
  }else{tempItems[i].pId=pId||'';tempItems[i].nome=''}
  renderVItens(DB.get(S.PRODUTOS).filter(p=>p.tipo==='produto'&&p.ativo));calcVendaTotals()
}
function updateItemVenda(i,f,v){
  tempItems[i][f]=parseFloat(v)||0
  tempItems[i].sub=(tempItems[i].qtd||1)*(tempItems[i].pu||0)

function salvarVenda(){
  const cliId=(document.getElementById('vCli')||{}).value
  const data=(document.getElementById('vData')||{}).value
  if(!cliId||!data){toast('Selecione cliente e data','err');return}
  const itens=tempItems.filter(x=>x.sub>0||x.pu>0)
  if(!itens.length){toast('Adicione ao menos um item','err');return}
  const total=itens.reduce((a,x)=>a+x.sub,0)
  const desc=parseFloat((document.getElementById('vDesc')||{}).value)||0
  const totalF=total-desc
  const pgto=(document.getElementById('vPgto')||{}).value
  const status=(document.getElementById('vStatus')||{}).value
  const obs=(document.getElementById('vObs')||{}).value
  const vendas=DB.get(S.VENDAS);const trans=DB.get(S.TRANS)
  if(editId){
    const idx=vendas.findIndex(x=>x.id===editId)
    if(idx>=0)vendas[idx]={id:editId,cliId,data,itens,total,desc,totalF,pgto,status,obs}
    DB.set(S.VENDAS,vendas)
    const ti=trans.findIndex(x=>x.ref===editId)
    if(ti>=0){trans[ti]={...trans[ti],val:totalF,data,pgto,desc:`Venda - ${clienteNome(cliId)}`};DB.set(S.TRANS,trans)}
    closeModal();toast('Venda atualizada!','ok')
  }else{
    const venda={id:genId(),cliId,data,itens,total,desc,totalF,pgto,status,obs}
    vendas.push(venda);DB.set(S.VENDAS,vendas)
    trans.push({id:genId(),tipo:'entrada',cat:'Venda',desc:`Venda - ${clienteNome(cliId)}`,val:totalF,data,pgto,ref:venda.id})
    DB.set(S.TRANS,trans)
    closeModal();toast('Venda registrada!','ok')
  }
  render('vendas')
}

function bindEst(){renderEstTable()}
function setEstTab(tab,el){

function renderEstTable(){

  if(q)rows=rows.filter(p=>p.nome.toLowerCase().includes(q.toLowerCase()))

    ${rows.map(p=>{

          <button class="btn-ic btn-d" onclick="excluirProd('${p.id}')"><svg width="13" height="13" fill="none" viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        </td>
      </tr>`

}

function novoProd(){editId=null;openModal('Novo Item',prodForm({tipo:estoqueTab}),`<button class="btn btn-s" onclick="closeModal()">Cancelar</button><button class="btn btn-p" onclick="salvarProd()">Salvar</button>`)}
function editProd(id){const p=DB.get(S.PRODUTOS).find(x=>x.id===id);if(!p)return;editId=id;openModal('Editar Item',prodForm(p),`<button class="btn btn-s" onclick="closeModal()">Cancelar</button><button class="btn btn-p" onclick="salvarProd()">Salvar</button>`)}
function prodForm(p){
  return`
  <div class="frow"><div class="fg"><label>Nome *</label><input id="pNome" value="${p.nome||''}" placeholder="Nome do item"></div>
  <div class="fg"><label>Tipo</label><select id="pTipo" onchange="togglePrecoCampo()"><option value="produto" ${p.tipo==='produto'?'selected':''}>Produto Final</option><option value="ingrediente" ${p.tipo==='ingrediente'?'selected':''}>Ingrediente/MP</option></select></div></div>
  <div class="frow"><div class="fg"><label>Categoria</label><input id="pCat" value="${p.cat||''}" placeholder="Bolos, Cupcakes..."></div>
  <div class="fg"><label>Unidade</label><select id="pUn">${['un','kg','g','ml','l','cx','pct'].map(u=>`<option ${p.un===u?'selected':''}>${u}</option>`).join('')}</select></div></div>
  <div class="frow t3">
    <div class="fg" id="campoPreco" style="${p.tipo==='ingrediente'?'display:none':''}"><label>Preço Venda (R$)</label><input type="number" id="pPreco" value="${p.preco||0}" min="0" step="0.01"></div>
    <div class="fg"><label>Custo Unit. (R$)</label><input type="number" id="pCusto" value="${p.custo||0}" min="0" step="0.01"></div>
  </div>
  <div class="frow"><div class="fg"><label>Estoque Atual</label><input type="number" id="pEst" value="${p.estoque||0}" min="0"></div>
  <div class="fg"><label>Estoque Mínimo</label><input type="number" id="pMin" value="${p.minimo||0}" min="0"></div></div>`
}
function togglePrecoCampo(){
  const t=(document.getElementById('pTipo')||{}).value
  const el=document.getElementById('campoPreco')
  if(el)el.style.display=t==='ingrediente'?'none':''
}
function salvarProd(){
  const nome=(document.getElementById('pNome')||{}).value||''
  if(!nome.trim()){toast('Informe o nome','err');return}
  const tipo=(document.getElementById('pTipo')||{}).value||'produto'
  const p={id:editId||genId(),nome:nome.trim(),tipo,cat:(document.getElementById('pCat')||{}).value,un:(document.getElementById('pUn')||{}).value,preco:parseFloat((document.getElementById('pPreco')||{}).value)||0,custo:parseFloat((document.getElementById('pCusto')||{}).value)||0,estoque:parseFloat((document.getElementById('pEst')||{}).value)||0,minimo:parseFloat((document.getElementById('pMin')||{}).value)||0,ativo:true}
  const prods=DB.get(S.PRODUTOS);if(editId){const i=prods.findIndex(x=>x.id===editId);if(i>=0)prods[i]=p}else prods.push(p)
  DB.set(S.PRODUTOS,prods);closeModal();toast('Item salvo!','ok');estoqueTab=tipo;render('estoque')
}
function ajustarEstoque(id){
  const p=DB.get(S.PRODUTOS).find(x=>x.id===id);if(!p)return
  openModal(`Ajustar Estoque — ${p.nome}`,`
    <div style="margin-bottom:14px;padding:12px;background:var(--cream);border-radius:8px;display:flex;justify-content:space-between;align-items:center">
      <span style="color:var(--txt2)">Estoque atual:</span>
      <strong style="font-size:18px">${p.estoque} ${p.un}</strong>
    </div>
    <div class="fg"><label>Tipo de Ajuste</label><select id="ajTipo"><option value="set">Definir quantidade</option><option value="add">Adicionar ao estoque</option><option value="rem">Remover do estoque</option></select></div>
    <div class="fg"><label>Quantidade</label><input type="number" id="ajQtd" value="${p.estoque}" min="0" step="0.01" placeholder="Quantidade"></div>`,
    `<button class="btn btn-s" onclick="closeModal()">Cancelar</button><button class="btn btn-p" onclick="confirmarAjuste('${id}')">Confirmar</button>`)
}
function confirmarAjuste(id){
  const tipo=(document.getElementById('ajTipo')||{}).value;const qtd=parseFloat((document.getElementById('ajQtd')||{}).value)||0
  const prods=DB.get(S.PRODUTOS);const i=prods.findIndex(x=>x.id===id);if(i<0)return
  if(tipo==='set')prods[i].estoque=qtd
  else if(tipo==='add')prods[i].estoque+=qtd
  else prods[i].estoque=Math.max(0,prods[i].estoque-qtd)
  DB.set(S.PRODUTOS,prods);closeModal();toast('Estoque atualizado!','ok');render('estoque')
}
function excluirProd(id){
  if(!confirm('Excluir este item?'))return
  DB.set(S.PRODUTOS,DB.get(S.PRODUTOS).filter(x=>x.id!==id));toast('Item removido','ok');render('estoque')
}

function cmpHTML(){
  return`
  <div class="ph"><div><h2>Compras</h2><p>Registro de compras de matérias-primas</p></div>
    <button class="btn btn-p" onclick="novaCompra()">+ Registrar Compra</button></div>
  <div class="card">

    <div class="tc" id="cmpTable"></div>
  </div>`
}
function bindCmp(){renderCmpTable()}
function renderCmpTable(){
  const q=(document.getElementById('srchCmp')||{}).value||''
  let rows=DB.get(S.COMPRAS).sort((a,b)=>b.data.localeCompare(a.data))
  if(q)rows=rows.filter(c=>c.forn.toLowerCase().includes(q.toLowerCase()))
  const el=document.getElementById('cmpTable');if(!el)return

  el.innerHTML=`<table><thead><tr><th>Data</th><th>Fornecedor</th><th>Itens</th><th>NF</th><th>Pagamento</th><th>Total</th><th></th></tr></thead><tbody>
    ${rows.map(c=>`<tr>
      <td>${fmtDate(c.data)}</td><td><strong>${c.forn}</strong></td>
      <td style="color:var(--txt3)">${c.itens.length} item(s)</td>
      <td>${c.nf||'—'}</td><td>${c.pgto}</td><td><strong>${fmt(c.total)}</strong></td>
      <td>
        <button class="btn-ic" style="margin-right:4px" onclick="verCompra('${c.id}')"><svg width="13" height="13" fill="none" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg></button>
        <button class="btn-ic" style="margin-right:4px" onclick="editCompra('${c.id}')"><svg width="13" height="13" fill="none" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <button class="btn-ic btn-d" onclick="excluirCompra('${c.id}')"><svg width="13" height="13" fill="none" viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      </td>
    </tr>`).join('')}
  </tbody></table>`
}

function novaCompra(){
  tempItems=[{pId:'',nome:'',qtd:1,pu:0,sub:0}];editId=null
  const ings=DB.get(S.PRODUTOS).filter(p=>p.tipo==='ingrediente'&&p.ativo)
  openModal('Registrar Compra',`
    <div class="frow"><div class="fg"><label>Fornecedor *</label><input id="cForn" placeholder="Nome do fornecedor"></div>
    <div class="fg"><label>Data</label><input type="date" id="cData" value="${today()}"></div></div>
    <div class="frow"><div class="fg"><label>Forma de Pagamento</label><select id="cPgto"><option>Pix</option><option>Boleto</option><option>Dinheiro</option><option>Cartão</option><option>Transferência</option></select></div>
    <div class="fg"><label>Nota Fiscal</label><input id="cNf" placeholder="NF-000"></div></div>
    <div style="margin-bottom:8px;font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px">Itens Comprados</div>
    <div class="items-tbl">
      <div class="items-hdr"><span>Ingrediente</span><span>Qtd</span><span>Preço Unit.</span><span>Subtotal</span><span></span></div>
      <div id="cItens"></div>
    </div>
    <button class="btn btn-s btn-sm" onclick="addCmpItem()">+ Item</button>
    <div style="margin-top:12px" id="cTotals"></div>
    <div class="fg" style="margin-top:10px"><label>Observações</label><textarea id="cObs" placeholder="Observações..."></textarea></div>`,
    `<button class="btn btn-s" onclick="closeModal()">Cancelar</button><button class="btn btn-p" onclick="salvarCompra()">Salvar Compra</button>`,true)
  renderCItens(ings);calcCmpTotals()
}

function renderCItens(ings){
  const el=document.getElementById('cItens');if(!el)return
  if(!ings)ings=DB.get(S.PRODUTOS).filter(p=>p.tipo==='ingrediente'&&p.ativo)
  el.innerHTML=tempItems.map((it,i)=>`
    <div class="items-row">
      <select oninput="selectIngCmp(${i},this.value)" style="padding:5px 7px;border:1.5px solid var(--cream2);border-radius:6px;font-size:12px;font-family:inherit;outline:none;color:var(--txt)">
        <option value="">Selecionar...</option>
        ${ings.map(p=>`<option value="${p.id}" ${it.pId===p.id?'selected':''}>${p.nome}</option>`).join('')}
        <option value="_free" ${it.pId==='_free'?'selected':''}>Outro (livre)</option>
      </select>
      <input type="number" value="${it.qtd||1}" min="0.01" step="0.01" oninput="updateCmpItem(${i},'qtd',this.value)">
      <input type="number" value="${it.pu||0}" min="0" step="0.01" oninput="updateCmpItem(${i},'pu',this.value)">
      <span style="font-size:12px;color:var(--txt2);font-weight:600">${fmt(it.sub||0)}</span>
      <button class="btn-ic btn-d" onclick="removeCmpItem(${i})" style="padding:4px"><svg width="12" height="12" fill="none" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
    </div>`).join('')
}
function selectIngCmp(i,pId){
  const ings=DB.get(S.PRODUTOS).filter(p=>p.tipo==='ingrediente')
  if(pId&&pId!=='_free'){const p=ings.find(x=>x.id===pId);if(p){tempItems[i].pId=pId;tempItems[i].nome=p.nome}}
  else{tempItems[i].pId=pId||'';tempItems[i].nome=''}
  renderCItens();calcCmpTotals()
}
function updateCmpItem(i,f,v){tempItems[i][f]=parseFloat(v)||0;tempItems[i].sub=(tempItems[i].qtd||1)*(tempItems[i].pu||0);renderCItens();calcCmpTotals()}
function addCmpItem(){tempItems.push({pId:'',nome:'',qtd:1,pu:0,sub:0});renderCItens();calcCmpTotals()}
function removeCmpItem(i){if(tempItems.length>1)tempItems.splice(i,1);else tempItems=[{pId:'',nome:'',qtd:1,pu:0,sub:0}];renderCItens();calcCmpTotals()}
function calcCmpTotals(){
  const total=tempItems.reduce((a,x)=>a+(x.sub||0),0)
  const el=document.getElementById('cTotals');if(!el)return
  el.innerHTML=`<div class="totbox"><div class="trow bold"><span>Total da Compra</span><span>${fmt(total)}</span></div></div>`
}
function editCompra(id){
  const c=DB.get(S.COMPRAS).find(x=>x.id===id);if(!c)return
  editId=id;tempItems=JSON.parse(JSON.stringify(c.itens))
  const ings=DB.get(S.PRODUTOS).filter(p=>p.tipo==='ingrediente'&&p.ativo)
  const pgtos=['Pix','Boleto','Dinheiro','Cartão','Transferência']
  openModal('Editar Compra',`
    <div class="frow"><div class="fg"><label>Fornecedor *</label><input id="cForn" value="${c.forn||''}" placeholder="Nome do fornecedor"></div>

function salvarCompra(){
  const forn=(document.getElementById('cForn')||{}).value||''
  if(!forn.trim()){toast('Informe o fornecedor','err');return}
  const itens=tempItems.filter(x=>x.sub>0)
  if(!itens.length){toast('Adicione ao menos um item','err');return}
  const total=itens.reduce((a,x)=>a+x.sub,0)
  const data=(document.getElementById('cData')||{}).value
  const pgto=(document.getElementById('cPgto')||{}).value
  const cmps=DB.get(S.COMPRAS);const prods=DB.get(S.PRODUTOS);const trans=DB.get(S.TRANS)
  if(editId){
    const old=cmps.find(x=>x.id===editId)
    // reverter estoque da compra antiga
    if(old)old.itens.forEach(it=>{if(it.pId&&it.pId!=='_free'){const i=prods.findIndex(x=>x.id===it.pId);if(i>=0)prods[i].estoque=Math.max(0,prods[i].estoque-it.qtd)}})
    const idx=cmps.findIndex(x=>x.id===editId)
    cmps[idx]={id:editId,forn:forn.trim(),data,itens,total,pgto,nf:(document.getElementById('cNf')||{}).value,obs:(document.getElementById('cObs')||{}).value}
    DB.set(S.COMPRAS,cmps)
    // aplicar novo estoque
    itens.forEach(it=>{if(it.pId&&it.pId!=='_free'){const i=prods.findIndex(x=>x.id===it.pId);if(i>=0)prods[i].estoque+=it.qtd}})
    DB.set(S.PRODUTOS,prods)
    const ti=trans.findIndex(x=>x.ref===editId)
    if(ti>=0){trans[ti]={...trans[ti],val:total,data,pgto,desc:forn.trim()};DB.set(S.TRANS,trans)}
    closeModal();toast('Compra atualizada! Estoque ajustado.','ok')
  }else{
    const cmp={id:genId(),forn:forn.trim(),data,itens,total,pgto,nf:(document.getElementById('cNf')||{}).value,obs:(document.getElementById('cObs')||{}).value}
    cmps.push(cmp);DB.set(S.COMPRAS,cmps)
    itens.forEach(it=>{if(it.pId&&it.pId!=='_free'){const i=prods.findIndex(x=>x.id===it.pId);if(i>=0)prods[i].estoque+=it.qtd}})
    DB.set(S.PRODUTOS,prods)
    trans.push({id:genId(),tipo:'saida',cat:'Compra de insumos',desc:forn.trim(),val:total,data,pgto,ref:cmp.id})
    DB.set(S.TRANS,trans)
    closeModal();toast('Compra registrada! Estoque atualizado.','ok')
  }
  render('compras')
}
function verCompra(id){
  const c=DB.get(S.COMPRAS).find(x=>x.id===id);if(!c)return
  openModal('Detalhe da Compra',`
    <div style="margin-bottom:12px;display:flex;justify-content:space-between"><div><strong>${c.forn}</strong><div style="font-size:12px;color:var(--txt3)">${fmtDate(c.data)} · ${c.pgto}${c.nf?' · '+c.nf:''}</div></div></div>

function autoGerarOS(){
  const aprovados=DB.get(S.ORCAMENTOS).filter(o=>o.status==='aprovado')
  const orcIdsComOS=new Set(DB.get(S.OS).map(os=>os.orcId))
  const pendentes=aprovados.filter(o=>!orcIdsComOS.has(o.id))
  if(!pendentes.length)return 0
  const all=DB.get(S.OS)
  pendentes.forEach(o=>{
    const num=(all.length?Math.max(...all.map(x=>x.num)):0)+1
    all.push({id:genId(),num,orcId:o.id,cliId:o.cliId,data:today(),prazo:'',itens:JSON.parse(JSON.stringify(o.itens)),total:o.totalF,status:'aberta',obs:o.obs||'',responsavel:''})
  })
  DB.set(S.OS,all)
  return pendentes.length
}

function sincronizarOS(){
  const n=autoGerarOS()
  if(n>0){toast(`${n} nova(s) OS gerada(s)!`,'ok');renderOSBanner(n)}

function gerarOS(orcId){
  const o=DB.get(S.ORCAMENTOS).find(x=>x.id===orcId);if(!o)return
  const orcIdsComOS=new Set(DB.get(S.OS).map(os=>os.orcId))
  if(orcIdsComOS.has(orcId)){toast('OS já gerada para este orçamento','warn');navigate('os');return}
  const all=DB.get(S.OS)
  const num=(all.length?Math.max(...all.map(x=>x.num)):0)+1
  all.push({id:genId(),num,orcId,cliId:o.cliId,data:today(),prazo:'',itens:JSON.parse(JSON.stringify(o.itens)),total:o.totalF,status:'aberta',obs:o.obs||'',responsavel:''})
  DB.set(S.OS,all);toast(`OS #${String(num).padStart(3,'0')} criada!`,'ok');navigate('os')
}
function updateStatusOS(id,status){
  const all=DB.get(S.OS);const i=all.findIndex(x=>x.id===id);if(i<0)return
  all[i].status=status;if(status==='concluida')all[i].dataConc=today()
  DB.set(S.OS,all);toast('Status atualizado!','ok');renderOSTable()
}
function verOS(id){
  const os=DB.get(S.OS).find(x=>x.id===id);if(!os)return
  const lblOS={aberta:'Aberta',em_andamento:'Em Andamento',concluida:'Concluída',cancelada:'Cancelada'}
  openModal(`OS #${String(os.num).padStart(3,'0')}`,`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div><strong style="font-size:15px">${clienteNome(os.cliId)}</strong><div style="font-size:12px;color:var(--txt3)">Criada em ${fmtDate(os.data)}</div></div>
    </div>
    <div class="frow"><div class="fg"><label>Prazo de Entrega</label><input type="date" id="osPrazo" value="${os.prazo||''}"></div>
    <div class="fg"><label>Responsável</label><input id="osResp" value="${os.responsavel||''}" placeholder="Nome do responsável"></div></div>
    <div class="fg"><label>Observações</label><textarea id="osObs" placeholder="Anotações internas...">${os.obs||''}</textarea></div>
    <div class="tc" style="margin-top:12px"><table><thead><tr><th>Item</th><th>Qtd</th><th>Valor</th></tr></thead><tbody>
      ${os.itens.map(it=>`<tr><td>${it.nome}</td><td>${it.qtd}</td><td>${fmt(it.sub)}</td></tr>`).join('')}
    </tbody></table></div>

    `<button class="btn btn-s" onclick="closeModal()">Fechar</button><button class="btn btn-p" onclick="salvarOS('${os.id}')">Salvar</button><button class="btn btn-s" onclick="imprimirOS('${os.id}')">Imprimir</button>`)

function salvarOS(id){
  const all=DB.get(S.OS);const i=all.findIndex(x=>x.id===id);if(i<0)return
  all[i].prazo=v('osPrazo');all[i].responsavel=v('osResp');all[i].obs=v('osObs')

        Aprovar via E-mail</a>

// ===== RELATÓRIOS =====
function relHTML(){
  const mes=thisMonth()
  return`
  <div class="ph"><div><h2>Relatórios</h2><p>Análise do seu negócio</p></div></div>
  <div class="tabs" id="relTabs">
    <div class="tab active" onclick="setRelTab('vendas',this)">Vendas</div>
    <div class="tab" onclick="setRelTab('financeiro',this)">Financeiro</div>
    <div class="tab" onclick="setRelTab('produtos',this)">Produtos</div>
    <div class="tab" onclick="setRelTab('clientes',this)">Clientes</div>
  </div>
  <div style="display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap">
    <div class="fg" style="margin:0"><label style="font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px">De</label><input type="date" id="relDe" value="${mes}-01" onchange="renderRelatorio()"></div>
    <div class="fg" style="margin:0"><label style="font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px">Até</label><input type="date" id="relAte" value="${today()}" onchange="renderRelatorio()"></div>
    <button class="btn btn-s" style="margin-top:14px" onclick="imprimirRelatorio()">Imprimir Relatório</button>
  </div>
  <div id="relContent"></div>`
}
let relTab='vendas'
function bindRel(){renderRelatorio()}
function setRelTab(tab,el){
  relTab=tab
  document.querySelectorAll('#relTabs .tab').forEach(t=>t.classList.remove('active'))
  el.classList.add('active');renderRelatorio()
}
function getRelDatas(){
  return{de:v('relDe')||thisMonth()+'-01',ate:v('relAte')||today()}
}
function renderRelatorio(){
  const {de,ate}=getRelDatas()
  const el=document.getElementById('relContent');if(!el)return
  if(relTab==='vendas')el.innerHTML=relVendasHTML(de,ate)
  else if(relTab==='financeiro')el.innerHTML=relFinHTML(de,ate)
  else if(relTab==='produtos')el.innerHTML=relProdHTML(de,ate)
  else el.innerHTML=relCliHTML(de,ate)
}
function relVendasHTML(de,ate){
  const vs=DB.get(S.VENDAS).filter(v=>v.data>=de&&v.data<=ate).sort((a,b)=>b.data.localeCompare(a.data))
  const total=vs.reduce((a,v)=>a+v.totalF,0)
  const pagas=vs.filter(v=>v.status==='pago')
  const pendentes=vs.filter(v=>v.status==='pendente')
  return`
  <div class="stats-grid" style="margin-bottom:16px">
    <div class="stat g"><div class="stat-lbl">Total de Vendas</div><div class="stat-val">${fmt(total)}</div><div class="stat-sub">${vs.length} pedido(s)</div></div>
    <div class="stat"><div class="stat-lbl">Pagas</div><div class="stat-val">${fmt(pagas.reduce((a,v)=>a+v.totalF,0))}</div><div class="stat-sub">${pagas.length} venda(s)</div></div>
    <div class="stat r"><div class="stat-lbl">Pendentes</div><div class="stat-val">${fmt(pendentes.reduce((a,v)=>a+v.totalF,0))}</div><div class="stat-sub">${pendentes.length} venda(s)</div></div>
    <div class="stat b"><div class="stat-lbl">Ticket Médio</div><div class="stat-val">${fmt(vs.length?total/vs.length:0)}</div></div>
  </div>
  <div class="card"><div class="card-title">Vendas no Período</div>
  ${!vs.length?`<div class="empty"><h3>Sem vendas no período</h3></div>`:`
  <div class="tc"><table><thead><tr><th>Data</th><th>Cliente</th><th>Itens</th><th>Pagamento</th><th>Status</th><th>Total</th><th></th></tr></thead><tbody>
    ${vs.map(vd=>`<tr><td>${fmtDate(vd.data)}</td><td>${clienteNome(vd.cliId)}</td><td style="color:var(--txt3)">${vd.itens.length}x</td><td>${vd.pgto}</td>
    <td>${vd.status==='pago'?'<span class="bdg bdg-g">Pago</span>':'<span class="bdg bdg-y">Pendente</span>'}</td>
    <td><strong>${fmt(vd.totalF)}</strong></td>
    <td><button class="btn-ic" onclick="imprimirVenda('${vd.id}')"><svg width="12" height="12" fill="none" viewBox="0 0 24 24"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg></button></td>
    </tr>`).join('')}
  </tbody></table></div>`}</div>`
}
function relFinHTML(de,ate){
  const ts=DB.get(S.TRANS).filter(t=>t.data>=de&&t.data<=ate)
  const ent=ts.filter(t=>t.tipo==='entrada').reduce((a,t)=>a+t.val,0)
  const sai=ts.filter(t=>t.tipo==='saida').reduce((a,t)=>a+t.val,0)
  // group by category
  const cats={}
  ts.forEach(t=>{if(!cats[t.cat])cats[t.cat]={e:0,s:0};cats[t.cat][t.tipo==='entrada'?'e':'s']+=t.val})
  return`
  <div class="stats-grid" style="margin-bottom:16px">
    <div class="stat g"><div class="stat-lbl">Entradas</div><div class="stat-val">${fmt(ent)}</div></div>
    <div class="stat r"><div class="stat-lbl">Saídas</div><div class="stat-val">${fmt(sai)}</div></div>
    <div class="stat ${ent-sai>=0?'g':'r'}"><div class="stat-lbl">Resultado</div><div class="stat-val" style="color:${ent-sai>=0?'var(--ok)':'var(--bad)'}">${fmt(ent-sai)}</div></div>
  </div>
  <div class="card"><div class="card-title">Por Categoria</div>
  <div class="tc"><table><thead><tr><th>Categoria</th><th>Entradas</th><th>Saídas</th><th>Saldo</th></tr></thead><tbody>
    ${Object.entries(cats).sort((a,b)=>b[1].e-a[1].e).map(([cat,v])=>`<tr>
      <td>${cat}</td><td style="color:var(--ok)">${v.e>0?fmt(v.e):'—'}</td>
      <td style="color:var(--bad)">${v.s>0?fmt(v.s):'—'}</td>
      <td style="font-weight:700;color:${v.e-v.s>=0?'var(--ok)':'var(--bad)'}">${fmt(v.e-v.s)}</td>
    </tr>`).join('')}
  </tbody></table></div></div>`
}
function relProdHTML(de,ate){
  const vs=DB.get(S.VENDAS).filter(v=>v.data>=de&&v.data<=ate)
  const map={}
  vs.forEach(vd=>vd.itens.forEach(it=>{if(!map[it.nome])map[it.nome]={qtd:0,total:0};map[it.nome].qtd+=it.qtd;map[it.nome].total+=it.sub}))
  const rows=Object.entries(map).sort((a,b)=>b[1].total-a[1].total)
  return`
  <div class="card"><div class="card-title">Produtos mais Vendidos</div>
  ${!rows.length?`<div class="empty"><h3>Sem dados no período</h3></div>`:`
  <div class="tc"><table><thead><tr><th>Produto</th><th>Qtd Vendida</th><th>Faturamento</th><th>% do Total</th></tr></thead><tbody>
    ${(()=>{const tot=rows.reduce((a,r)=>a+r[1].total,0);return rows.map(([nome,d])=>`<tr><td><strong>${nome}</strong></td><td>${d.qtd}</td><td>${fmt(d.total)}</td>
    <td><div style="display:flex;align-items:center;gap:8px"><div class="pbar-wrap" style="width:80px"><div class="pbar-fill" style="width:${Math.round((d.total/tot)*100)}%"></div></div><span style="font-size:12px;color:var(--txt3)">${Math.round((d.total/tot)*100)}%</span></div></td>
    </tr>`)})().join('')}
  </tbody></table></div>`}</div>`
}
function relCliHTML(de,ate){
  const vs=DB.get(S.VENDAS).filter(v=>v.data>=de&&v.data<=ate)
  const map={}
  vs.forEach(vd=>{if(!map[vd.cliId])map[vd.cliId]={n:0,total:0};map[vd.cliId].n++;map[vd.cliId].total+=vd.totalF})
  const rows=Object.entries(map).sort((a,b)=>b[1].total-a[1].total)
  return`
  <div class="card"><div class="card-title">Clientes por Faturamento</div>
  ${!rows.length?`<div class="empty"><h3>Sem dados no período</h3></div>`:`
  <div class="tc"><table><thead><tr><th>Cliente</th><th>Nº Pedidos</th><th>Total Gasto</th><th>Ticket Médio</th></tr></thead><tbody>
    ${rows.map(([cliId,d])=>`<tr><td><strong>${clienteNome(cliId)}</strong></td><td>${d.n}</td><td>${fmt(d.total)}</td><td>${fmt(d.total/d.n)}</td></tr>`).join('')}
  </tbody></table></div>`}</div>`
}
function imprimirRelatorio(){
  const {de,ate}=getRelDatas()
  const e=getEmpresa();const nome=e.fantasia||e.nome||'Empresa'
  const vs=DB.get(S.VENDAS).filter(v=>v.data>=de&&v.data<=ate)
  const ts=DB.get(S.TRANS).filter(t=>t.data>=de&&t.data<=ate)
  const ent=ts.filter(t=>t.tipo==='entrada').reduce((a,t)=>a+t.val,0)
  const sai=ts.filter(t=>t.tipo==='saida').reduce((a,t)=>a+t.val,0)
  const w=window.open('','_blank','width=900,height=700')
  w.document.write(`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Relatório</title>
  <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Trebuchet MS',sans-serif;color:#1A0E08;padding:32px}
  h1{font-family:'Palatino Linotype',serif;font-size:20px;color:#C4724A;margin-bottom:4px}
  h2{font-family:'Palatino Linotype',serif;font-size:15px;color:#1A0E08;margin:20px 0 10px;border-bottom:1px solid #F0E6D8;padding-bottom:6px}
  table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:16px}
  th{background:#F0E6D8;padding:7px 10px;text-align:left;font-size:10px;text-transform:uppercase}
  td{padding:7px 10px;border-bottom:1px solid #F0E6D8}
  .stats{display:flex;gap:12px;margin-bottom:16px}
  .stat-box{flex:1;background:#FBF6F0;border-radius:8px;padding:12px;border-left:3px solid #C4724A}
  .stat-box.g{border-color:#4A8A65}.stat-box.r{border-color:#B84040}
  .slbl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#9A7A68}
  .sval{font-family:'Palatino Linotype',serif;font-size:20px;color:#1A0E08}
  @media print{body{padding:16px}}</style></head><body>
  <div style="border-bottom:3px solid #C4724A;padding-bottom:12px;margin-bottom:20px">
    <h1>${nome} — Relatório de Gestão</h1>
    <div style="font-size:12px;color:#9A7A68">Período: ${fmtDate(de)} a ${fmtDate(ate)}</div>
  </div>
  <div class="stats">
    <div class="stat-box g"><div class="slbl">Faturamento</div><div class="sval">${fmt(vs.reduce((a,v)=>a+v.totalF,0))}</div></div>
    <div class="stat-box g"><div class="slbl">Entradas</div><div class="sval">${fmt(ent)}</div></div>
    <div class="stat-box r"><div class="slbl">Saídas</div><div class="sval">${fmt(sai)}</div></div>
    <div class="stat-box ${ent-sai>=0?'g':'r'}"><div class="slbl">Resultado</div><div class="sval">${fmt(ent-sai)}</div></div>
  </div>
  <h2>Vendas no Período (${vs.length})</h2>
  <table><thead><tr><th>Data</th><th>Cliente</th><th>Pagamento</th><th>Status</th><th>Total</th></tr></thead><tbody>
    ${vs.map(vd=>`<tr><td>${fmtDate(vd.data)}</td><td>${clienteNome(vd.cliId)}</td><td>${vd.pgto}</td><td>${vd.status==='pago'?'Pago':'Pendente'}</td><td><strong>${fmt(vd.totalF)}</strong></td></tr>`).join('')}
  </tbody></table>
  </body></html>`)
  w.document.close();setTimeout(()=>w.print(),400)
}
